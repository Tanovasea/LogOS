<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Logos">
<meta name="description" content="Logos — microsistemul tău personal. Offline. Al tău.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Logos</title>
<style>
  :root{
    --fundal:#0d1117;      /* gri-albastru tehnic, adânc */
    --panou:#161b22;
    --linie:#21262d;
    --linie-clar:#30363d;
    --text:#c9d1d9;
    --text-stins:#8b949e;
    --accent:#58a6ff;      /* albastru terminal */
    --accent-cald:#d29922; /* chihlimbar pentru accente */
    --verde:#3fb950;
    --rosu:#f85149;
    --mono:'SF Mono','JetBrains Mono','Roboto Mono',ui-monospace,'Courier New',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* barele de control din ferestre NU se selectează, chiar dacă fereastra e activă */
  .viz-bara, #term-unelte, #intrare-term, .term-setari, .viz-panou,
  .cap-fereastra, .ed-cap, .fila, #bara, #dock, .ic, #salut-desktop{
    -webkit-user-select:none !important;user-select:none !important;
  }
  html,body{
    height:100%;background:var(--fundal);color:var(--text);
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
    overflow:hidden;overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;  /* interfața nu se selectează */
  }
  /* doar CONȚINUTUL real e selectabil: text din fișiere și terminal */
  #iesire-term, .viz-corp, .corp-fereastra pre, .corp-fereastra .vd,
  .corp-fereastra .doc, .ed-area, textarea, input{
    -webkit-user-select:text;user-select:text;
  }

  /* ===== BARA DE SUS ===== */
  #bara{
    position:fixed;top:0;left:0;right:0;height:calc(env(safe-area-inset-top,0) + 46px);
    padding-top:env(safe-area-inset-top,0);
    background:var(--panou);border-bottom:1px solid var(--linie);
    display:flex;align-items:center;justify-content:flex-start;gap:10px;
    padding-left:14px;padding-right:12px;z-index:100;
  }
  #marca{display:flex;align-items:center;gap:7px;font-weight:700;letter-spacing:0;font-size:.95rem}
  #marca .astru{
    position:relative;width:16px;height:16px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  #marca .pct{
    width:8px;height:8px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 8px var(--accent),0 0 14px rgba(88,166,255,.5);
    position:relative;z-index:2;
  }
  /* semicercul în jurul punctului luminos */
  #marca .arc{
    position:absolute;inset:0;border-radius:50%;
    border:1.5px solid var(--accent);
    border-right-color:transparent;border-bottom-color:transparent;
    transform:rotate(-45deg);opacity:.85;
  }
  #marca .nume{display:inline-block}
  #marca .nume b{color:var(--accent);font-weight:700}  /* OS evidențiat */
  #ceas{display:none}

  /* ===== ECRANUL DE PORNIRE (desktop) ===== */
  #desktop{
    position:absolute;inset:0;top:calc(env(safe-area-inset-top,0) + 46px);
    bottom:env(safe-area-inset-bottom,0);
    padding:26px 22px;overflow-y:auto;
  }
  #salut-desktop{color:var(--text-stins);font-size:.9rem;margin-bottom:22px;line-height:1.5}
  #salut-desktop b{color:var(--text)}
  #grila{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px 4px;
  }
  .ic{
    display:flex;flex-direction:column;align-items:center;gap:8px;
    padding:12px 6px;border-radius:14px;cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .ic:active{background:var(--linie);transform:scale(.94)}
  .ic .glif{
    width:52px;height:52px;border-radius:15px;
    background:linear-gradient(150deg,var(--panou),#1c2430);
    border:1px solid var(--linie-clar);
    display:flex;align-items:center;justify-content:center;
    font-size:25px;
  }
  .ic .nume{font-size:.74rem;color:var(--text-stins);text-align:center;letter-spacing:.02em}

  /* ===== DOCK JOS ===== */
  #dock{display:none}

  /* ===== COMUTATORUL (în continuarea mărcii, inline în bară) ===== */
  #comutator{
    flex:1;min-width:0;height:100%;
    display:flex;gap:6px;align-items:center;
    overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #comutator::-webkit-scrollbar{display:none}
  .fila{
    display:flex;align-items:center;gap:6px;flex-shrink:0;
    padding:5px 9px;border-radius:8px;cursor:pointer;
    background:var(--fundal);border:1px solid var(--linie);
    font-size:.76rem;color:var(--text-stins);
    transition:all .15s ease;white-space:nowrap;
  }
  .fila.activa{border-color:var(--accent);color:var(--text);background:#11202e}
  .fila .fg{font-size:.85rem}
  .fila .ft{max-width:90px;overflow:hidden;text-overflow:ellipsis}
  .fila .fx{
    margin-left:1px;width:16px;height:16px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-stins);font-size:12px;
  }
  .fila .fx:active{background:var(--linie);color:var(--rosu)}

  /* ===== FERESTRELE (mai multe vii deodată) ===== */
  #ferestre{
    position:absolute;inset:0;top:calc(env(safe-area-inset-top,0) + 46px);
    bottom:env(safe-area-inset-bottom,0);
    z-index:50;
    pointer-events:none;   /* stratul gol lasă atingerea la desktop */
  }
  /* dar ferestrele vii primesc toate atingerile */
  .fereastra.deschis,
  .fereastra.fundal,
  .maner-redim{ pointer-events:auto }
  .fereastra.deschis *,
  .fereastra.fundal *{ pointer-events:auto }
  .fereastra{
    position:absolute;inset:0;
    background:var(--fundal);
    display:flex;flex-direction:column;
    transform:translateY(100%);opacity:0;pointer-events:none;
    visibility:hidden;user-select:none;-webkit-user-select:none;
    transition:transform .3s cubic-bezier(.2,.8,.2,1), opacity .3s ease, visibility 0s .3s;
  }
  .fereastra.deschis{transform:translateY(0);opacity:1;pointer-events:auto;visibility:visible;user-select:text;-webkit-user-select:text;transition:transform .3s cubic-bezier(.2,.8,.2,1), opacity .3s ease, visibility 0s}
  .fereastra.fundal{transform:translateY(0);opacity:0;pointer-events:none;visibility:hidden;user-select:none;-webkit-user-select:none;transition:none}
  .cap-fereastra{
    display:none;align-items:center;gap:12px;padding:10px 14px;
    border-bottom:1px solid var(--linie);background:var(--panou);
  }
  .cap-fereastra .titlu{font-weight:600;font-size:.92rem;flex:1}
  .cap-fereastra .x{
    width:30px;height:30px;border-radius:8px;border:1px solid var(--linie-clar);
    display:flex;align-items:center;justify-content:center;color:var(--text-stins);
    cursor:pointer;font-size:18px;
  }
  .cap-fereastra .x:active{background:var(--linie);color:var(--text)}
  .corp-fereastra{flex:1;overflow:hidden;position:relative}

  /* ===== MOD BIROU (ecran mare): ferestre alăturate ===== */
  body.birou #ferestre{
    display:flex;flex-direction:row;gap:1px;background:var(--linie-clar);
  }
  body.birou .fereastra{
    position:relative;inset:auto;flex:1 1 0;min-width:220px;
    transform:none;opacity:1;visibility:visible;
    user-select:text;-webkit-user-select:text;
    transition:none;border:none;
    display:none;
  }
  /* mâner de redimensionare între ferestre (doar cu mouse — degetul nu-l poate apuca bine) */
  .maner-redim{
    display:none;flex:0 0 5px;cursor:col-resize;
    background:var(--linie-clar);
    align-self:stretch;position:relative;z-index:200;
    user-select:none;-webkit-user-select:none;touch-action:none;
  }
  .maner-redim::before{
    content:'';position:absolute;top:0;bottom:0;left:-5px;right:-5px;
  }
  .maner-redim::after{
    content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:2px;height:26px;border-radius:2px;background:var(--text-stins);opacity:.5;
  }
  .maner-redim:hover,.maner-redim.activ{background:var(--accent)}
  .maner-redim:hover::after,.maner-redim.activ::after{background:#fff;opacity:1}
  body.birou .maner-redim{display:flex}
  /* pe atingere, mânerul e mai lat, ca să-l prinzi cu degetul */
  body.birou.deget .maner-redim{flex:0 0 14px}
  body.birou.deget .maner-redim::before{left:-8px;right:-8px}
  /* fereastra activă are capul evidențiat */
  body.birou .fereastra.activa .cap-fereastra{
    background:var(--panou);box-shadow:inset 0 2px 0 var(--accent)
  }
  body.birou .fereastra.activa .cap-fereastra .titlu{color:var(--accent)}
  /* când ești Acasă în mod birou, ascunde ferestrele ca să vezi iconițele */
  body.birou.acasa #ferestre{display:none}
  /* când ai ferestre deschise, ecranul de acasă nu fură atingerile */
  body.birou:not(.acasa) #desktop{pointer-events:none}
  body.birou .fereastra.deschis,
  body.birou .fereastra.fundal{
    display:flex;transform:none;opacity:1;visibility:visible;pointer-events:auto;
  }
  body.birou .maner-redim{display:flex;pointer-events:auto}
  /* în mod birou arătăm din nou capul ferestrei (cu titlu + ✕), ca să știi care e care */
  body.birou .cap-fereastra{display:flex}
  body.birou .fereastra:not(:last-child){border-right:1px solid var(--linie-clar)}
  /* pe ecran mare, conținutul central are o lățime plăcută */
  body.birou #desktop{max-width:none}

  /* ===== APLICAȚIA FIȘIERE ===== */
  .fisiere{height:100%;overflow-y:auto;padding:8px 0}
  .cale-bar{padding:10px 18px;color:var(--text-stins);font-family:var(--mono);font-size:.8rem;border-bottom:1px solid var(--linie)}

  .fm-corp{flex:1;display:flex;min-height:0;overflow:hidden}

  /* ===== TEMPORIZATOARE ÎN BARĂ ===== */
  #temporizatoare{display:flex;gap:6px;align-items:center;margin-left:auto;padding-left:10px;flex-shrink:0}
  .temp-chip{
    display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:8px;
    background:var(--panou);border:1px solid var(--linie-clar);
    font-size:.76rem;color:var(--text);white-space:nowrap;max-width:220px;
  }
  .temp-ceas{font-family:var(--mono);color:var(--accent);font-weight:600}
  .temp-txt{color:var(--text-stins);overflow:hidden;text-overflow:ellipsis;max-width:110px}
  .temp-x{cursor:pointer;color:var(--text-stins);padding:0 2px;font-size:.85rem}
  .temp-x:hover{color:var(--rosu)}
  .temp-chip.aproape{border-color:var(--rosu);animation:temp-puls 1s ease-in-out infinite}
  .temp-chip.aproape .temp-ceas{color:var(--rosu)}
  @keyframes temp-puls{0%,100%{opacity:1}50%{opacity:.6}}
  @media(max-width:600px){ .temp-txt{display:none} #temporizatoare{padding-left:6px} }

  .fm-item{
    -webkit-touch-callout:none;
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;
    cursor:pointer;   /* pe Safari/iOS, fără asta „click" nu se declanșează pe div-uri */
  }
  /* pe Safari/iOS, orice element pe care apeși are nevoie de cursor:pointer */
  .ic,.fila,.uf,.ms-r,.fm-meniu-b,.temp-x,.cap-fereastra .x,
  .buton-adauga,.rand .info,.rand .ig,.sterge-app,.u-bif,.u-x,
  .fm-inapoi,.term-buton,.viz-buton{ cursor:pointer }

  /* ===== MENIU START ===== */
  #meniu-start{
    position:fixed;z-index:500;min-width:250px;max-width:300px;
    background:var(--panou);border:1px solid var(--linie-clar);border-radius:12px;
    box-shadow:0 12px 40px rgba(0,0,0,.55);
    padding:7px;animation:ms-apare .12s ease-out;
    max-height:70vh;overflow-y:auto;
  }
  @keyframes ms-apare{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .ms-sec{
    font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;
    color:var(--text-stins);padding:8px 12px 5px;font-weight:600;
  }
  .ms-r{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;
    cursor:pointer;font-size:.9rem;color:var(--text);white-space:nowrap;
    overflow:hidden;
  }
  .ms-r:hover{background:var(--linie)}
  .ms-r.mic{font-size:.82rem;color:var(--text-stins);padding:8px 12px}
  .ms-r.mic:hover{color:var(--text)}
  .ms-r.rosu{color:var(--rosu)}
  .ms-ic{
    width:1.5em;text-align:center;flex-shrink:0;
    font-family:var(--mono);color:var(--accent);font-size:.95rem;
  }
  .ms-r.rosu .ms-ic{color:var(--rosu)}
  .ms-r span:nth-child(2){overflow:hidden;text-overflow:ellipsis}
  .ms-scurt{margin-left:auto;font-size:.7rem;color:var(--text-stins);font-family:var(--mono);padding-left:10px}
  .ms-linie{height:1px;background:var(--linie);margin:6px 8px}

  /* ===== TRAGERE ÎNTRE FERESTRE ===== */
  .fm-item[draggable]{cursor:grab}
  .fm-item.se-trage{opacity:.35}
  .fm-item.tinta{background:var(--panou);outline:2px dashed var(--accent);outline-offset:-3px}
  .fm-item.tinta .fm-ic-folder{transform:scale(1.08)}
  .fm-inapoi.tinta{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* când tragi, folderele sar în ochi */
  body.trag-fisier .fm-ic-folder{box-shadow:0 0 0 2px var(--accent), 0 2px 6px rgba(0,0,0,.35)}
  .term-tinta{outline:2px dashed var(--accent);outline-offset:-6px}

  /* ===== DRAG & DROP ===== */
  .drop-voal{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.72);
    display:flex;align-items:center;justify-content:center;pointer-events:none}
  .drop-cutie{border:2px dashed var(--accent);border-radius:18px;padding:44px 60px;
    text-align:center;color:var(--accent);font-size:1.15rem;line-height:1.9;background:var(--panou)}
  .drop-cutie small{color:var(--text-stins);font-size:.8rem}

  /* ===== UTILITARE ===== */  .util{height:100%;display:flex;flex-direction:column;overflow:hidden}
  .util-file{display:flex;gap:4px;padding:10px 12px;border-bottom:1px solid var(--linie);
    overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
  .uf{padding:7px 14px;border-radius:9px;font-size:.82rem;color:var(--text-stins);
    cursor:pointer;white-space:nowrap;border:1px solid transparent}
  .uf.activa{color:var(--accent);border-color:var(--linie-clar);background:var(--panou)}
  .uf:active{opacity:.7}
  .util-corp{flex:1;overflow-y:auto;padding:16px 14px 40px;-webkit-overflow-scrolling:touch}
  .u-rand{margin-bottom:18px}
  .u-rand label{display:block;font-size:.78rem;color:var(--text-stins);margin-bottom:7px;font-weight:600}
  .u-ctrl{display:flex;gap:8px}
  .u-ctrl input{flex:1;min-width:0;padding:11px 12px;border-radius:9px;border:1px solid var(--linie-clar);
    background:var(--fundal);color:var(--text);font-size:.92rem;outline:none;font-family:inherit}
  .u-ctrl input:focus{border-color:var(--accent)}
  .u-ctrl button{padding:11px 16px;border-radius:9px;border:1px solid var(--accent);
    background:transparent;color:var(--accent);font-size:.85rem;cursor:pointer;white-space:nowrap}
  .u-ctrl button:active{background:var(--accent);color:#fff}
  .u-rez{margin-top:8px;font-size:.9rem;min-height:1.2em;word-break:break-all}
  .u-rez.ok{color:var(--accent-cald)}
  .u-rez.err{color:var(--rosu)}
  .u-rez.mono{font-family:var(--mono);font-size:.85rem}
  .u-nota{font-size:.75rem;color:var(--text-stins);padding:8px 0;line-height:1.5}
  .u-info{text-align:center;padding:22px;font-size:.9rem;color:var(--text-stins);line-height:1.8}
  .u-info b{font-size:2.1rem;color:var(--accent);font-family:var(--mono)}
  .u-gol{color:var(--text-stins);font-size:.85rem;padding:16px 0;text-align:center}
  /* sarcini */
  .u-lista{margin-top:6px}
  .u-sarcina{display:flex;align-items:center;gap:11px;padding:12px 4px;border-bottom:1px solid var(--linie)}
  .u-bif{cursor:pointer;color:var(--accent);font-size:1.1rem;width:1.2em;text-align:center}
  .u-txt{flex:1;font-size:.92rem}
  .u-txt i{font-size:.78rem;color:var(--text-stins);font-style:normal}
  .u-sarcina.gata .u-txt{opacity:.45;text-decoration:line-through}
  .u-sarcina.intarziat .u-txt i{color:var(--rosu)}
  .u-x{cursor:pointer;color:var(--text-stins);padding:0 6px}
  .u-x:active{color:var(--rosu)}
  /* bani */
  .u-bilant{margin-top:8px}
  .u-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:.85rem}
  .u-cat{width:6.5em;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .u-bara{flex:1;height:8px;background:var(--linie);border-radius:4px;overflow:hidden}
  .u-bara i{display:block;height:100%;background:var(--accent);border-radius:4px}
  .u-suma{width:7em;text-align:right;color:var(--text-stins);font-family:var(--mono);font-size:.8rem}
  .u-total{margin-top:14px;padding-top:12px;border-top:1px solid var(--linie-clar);
    color:var(--accent-cald);font-weight:600}
  /* ===== MANAGER FIȘIERE VIZUAL ===== */
  .fm-bara{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--linie)}
  .fm-inapoi{color:var(--accent);cursor:pointer;font-size:.9rem;padding:6px 10px;border:1px solid var(--linie-clar);border-radius:8px}
  .fm-inapoi:active{background:var(--linie)}
  .fm-drum{color:var(--text-stins);font-family:var(--mono);font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fm-grila{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
    align-content:start;grid-auto-rows:min-content;
    gap:6px;padding:14px 12px;overflow-y:auto;
  }
  .fm-item{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:12px 6px;border-radius:12px;cursor:pointer;text-align:center;
  }
  .fm-item:active{background:var(--panou)}
  /* folder ca-n Windows: corp chihlimbar cu clapetă */
  .fm-ic-folder{
    width:52px;height:38px;position:relative;margin-top:8px;
    background:linear-gradient(180deg,#e8b64c,#d29a2f);
    border-radius:4px 6px 6px 6px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35), 0 2px 6px rgba(0,0,0,.35);
  }
  .fm-ic-folder::before{
    content:'';position:absolute;top:-7px;left:0;
    width:22px;height:9px;
    background:linear-gradient(180deg,#e8b64c,#dfa93e);
    border-radius:4px 6px 0 0;
  }
  /* fișier: foaie cu colț îndoit */
  .fm-ic-fisier{
    width:40px;height:50px;position:relative;
    background:linear-gradient(180deg,#f2f3f5,#d8dbe0);
    border-radius:4px;
    box-shadow:0 2px 6px rgba(0,0,0,.35);
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;
  }
  .fm-ic-fisier::before{
    content:'';position:absolute;top:0;right:0;
    width:12px;height:12px;
    background:linear-gradient(225deg,var(--fundal) 50%,#b9bec6 50%);
    border-radius:0 4px 0 4px;
  }
  .fm-ext{font-size:.55rem;font-weight:700;color:#4a5462;letter-spacing:.03em}
  .fm-nume{font-size:.74rem;color:var(--text);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fm-meta{font-size:.64rem;color:var(--text-stins)}
  .fisiere{height:100%;display:flex;flex-direction:column;position:relative;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  .fm-grila{flex:1}
  .fm-lacat{position:absolute;top:-8px;right:-8px;font-size:.85rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
  .fm-ic-folder,.fm-ic-fisier{position:relative}
  /* meniul de jos (apăsare lungă) */

<script>
"use strict";







/* ============================================================
   LOGOS — nucleu, depozit, aplicații
   Totul local. Fără server. Fără internet.
   ============================================================ */

/* ---------- CRIPTO: parola master → cheie de criptare (AES-GCM) ----------
   Parola NU se salvează niciodată. Doar o "sare" (sare aleatoare) și un
   "verificator" criptat rămân pe disc, ca să putem verifica o parolă
   introdusă ulterior fără să știm parola în sine. */
const Cripto = (()=>{
  const CHEIE_LS='logos_lacat';           // {sare, verificator, iteratii}
  const PREFIX='LZE1:';                    // marchează conținut criptat cu formatul curent
  const ITERATII=310000;
  let cheieCurenta=null;                   // CryptoKey ținută doar în memorie, în timpul sesiunii

  function buf2b64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
  function b642buf(s){ const bin=atob(s); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u.buffer; }

  function areLacat(){ return !!localStorage.getItem(CHEIE_LS); }
  function esteDeblocat(){ return !!cheieCurenta; }
  function blocheaza(){ cheieCurenta=null; }

  async function derivaCheie(parola, sareBuf, iteratii){
    const enc=new TextEncoder();
    const materialCheie=await crypto.subtle.importKey('raw', enc.encode(parola), {name:'PBKDF2'}, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:sareBuf, iterations:iteratii, hash:'SHA-256'},
      materialCheie, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
    );
  }

  async function seteazaParolaNoua(parola){
    const sare=crypto.getRandomValues(new Uint8Array(16));
    const cheie=await derivaCheie(parola, sare, ITERATII);
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const enc=new TextEncoder();
    const cifrat=await crypto.subtle.encrypt({name:'AES-GCM', iv}, cheie, enc.encode('LOGOS_OK'));
    const verificator=buf2b64(iv)+'.'+buf2b64(cifrat);
    localStorage.setItem(CHEIE_LS, JSON.stringify({sare:buf2b64(sare), verificator, iteratii:ITERATII}));
    cheieCurenta=cheie;
  }

  async function incearcaParola(parola){
    const raw=localStorage.getItem(CHEIE_LS);
    if(!raw) return false;
    const {sare, verificator, iteratii} = JSON.parse(raw);
    const cheie=await derivaCheie(parola, b642buf(sare), iteratii||ITERATII);
    try{
      const [ivB64, cifratB64]=verificator.split('.');
      const text=await crypto.subtle.decrypt({name:'AES-GCM', iv:b642buf(ivB64)}, cheie, b642buf(cifratB64));
      if(new TextDecoder().decode(text)!=='LOGOS_OK') return false;
      cheieCurenta=cheie;
      return true;
    }catch(e){ return false; }
  }

  async function encripteaza(text){
    if(!cheieCurenta || typeof text!=='string') return text;
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const cifrat=await crypto.subtle.encrypt({name:'AES-GCM', iv}, cheieCurenta, new TextEncoder().encode(text));
    return PREFIX+buf2b64(iv)+'.'+buf2b64(cifrat);
  }

  async function decripteaza(text){
    if(typeof text!=='string' || !text.startsWith(PREFIX)) return text; // conținut vechi, necriptat — îl lăsăm așa (migrare fără pierderi)
    if(!cheieCurenta) return '⚠ blocat';
    try{
      const [ivB64, cifratB64]=text.slice(PREFIX.length).split('.');
      const clar=await crypto.subtle.decrypt({name:'AES-GCM', iv:b642buf(ivB64)}, cheieCurenta, b642buf(cifratB64));
      return new TextDecoder().decode(clar);
    }catch(e){ return '⚠ eroare la decriptare'; }
  }

  function esteCriptat(text){ return typeof text==='string' && text.startsWith(PREFIX); }

  // verifică o parolă contra verificatorului salvat, FĂRĂ să schimbe sesiunea curentă
  async function verificaParolaBrut(parola){
    const raw=localStorage.getItem(CHEIE_LS);
    if(!raw) return {ok:false};
    const {sare, verificator, iteratii} = JSON.parse(raw);
    const cheie=await derivaCheie(parola, b642buf(sare), iteratii||ITERATII);
    try{
      const [ivB64, cifratB64]=verificator.split('.');
      const text=await crypto.subtle.decrypt({name:'AES-GCM', iv:b642buf(ivB64)}, cheie, b642buf(cifratB64));
      return {ok:new TextDecoder().decode(text)==='LOGOS_OK', cheie};
    }catch(e){ return {ok:false}; }
  }

  // schimbă parola master: verifică parola veche, decriptează tot cu ea,
  // creează cheie nouă, recriptează și rescrie fiecare fișier
  async function schimbaParola(parolaVeche, parolaNoua, alRaporteazaProgres){
    if(!parolaVeche || parolaNoua.length<6) return {succes:false, motiv:'Parola nouă trebuie să aibă minim 6 caractere.'};
    const verifVeche=await verificaParolaBrut(parolaVeche);
    if(!verifVeche.ok) return {succes:false, motiv:'Parola actuală este greșită.'};

    cheieCurenta=verifVeche.cheie; // cheia veche — necesară ca Depozit să poată decripta la citire
    const toate=await Depozit.toateNefiltrate();  // citește tot, decriptat cu cheia veche

    await seteazaParolaNoua(parolaNoua); // generează sare + cheie nouă, actualizează localStorage, cheieCurenta=nouă

    let gata=0;
    for(const f of toate){
      await Depozit.scrie(f); // Depozit criptează automat cu cheieCurenta (deja cea nouă)
      gata++;
      if(alRaporteazaProgres) alRaporteazaProgres(gata+'/'+toate.length);
    }
    return {succes:true};
  }

  return {areLacat, esteDeblocat, blocheaza, seteazaParolaNoua, incearcaParola, encripteaza, decripteaza, schimbaParola, esteCriptat};
})();

/* ---------- ECRAN DE BLOCARE: cere parola master la pornire, la reluare, și la schimbarea parolei ---------- */
const EcranLacat = (()=>{
  const el=document.getElementById('ecran-lacat');
  const titlu=document.getElementById('lac-titlu');
  const text=document.getElementById('lac-text');
  const p0=document.getElementById('lac-parola0');
  const p1=document.getElementById('lac-parola');
  const p2=document.getElementById('lac-parola2');
  const eroare=document.getElementById('lac-eroare');
  const buton=document.getElementById('lac-buton');
  const anuleaza=document.getElementById('lac-anuleaza');
  const nota=document.getElementById('lac-nota');

  function arata(){ el.classList.remove('ascuns'); }
  function ascunde(){ el.classList.add('ascuns'); }

  // ține evidența ascultătorilor curenți, ca să-i scoatem înainte de a pune alții noi
  // (fără asta, la fiecare (re)blocare s-ar aduna ascultători peste ascultători)
  let manClick=null, manP0=null, manP1=null, manP2=null, manAnul=null;
  function curataAscultatori(){
    if(manClick) buton.removeEventListener('click', manClick);
    if(manP0) p0.removeEventListener('keydown', manP0);
    if(manP1) p1.removeEventListener('keydown', manP1);
    if(manP2) p2.removeEventListener('keydown', manP2);
    if(manAnul) anuleaza.removeEventListener('click', manAnul);
    manClick=manP0=manP1=manP2=manAnul=null;
  }

  function pregatesteFormular(modSetup){
    p0.value=''; p1.value=''; p2.value=''; eroare.textContent='';
    p0.style.display='none';
    p2.style.display = modSetup ? '' : 'none';
    anuleaza.style.display='none';
    if(modSetup){
      titlu.textContent='Creează parola master';
      text.textContent='Logos va cripta tot ce salvezi cu această parolă. Dacă o uiți, datele nu mai pot fi recuperate — nu există "resetare".';
      buton.textContent='Creează și pornește';
      nota.textContent='Minim 6 caractere. Ține-o minte — e singura cheie.';
    } else {
      titlu.textContent='Logos e blocat';
      text.textContent='Introdu parola master pentru a debloca sistemul.';
      buton.textContent='Deblochează';
      nota.textContent='';
    }
  }

  function asteaptaDeblocare(){
    return new Promise((rezolva)=>{
      curataAscultatori();
      const modSetup=!Cripto.areLacat();
      pregatesteFormular(modSetup);
      arata();
      setTimeout(()=>p1.focus(),300);

      async function incearca(){
        eroare.textContent='';
        if(modSetup){
          if(p1.value.length<6){ eroare.textContent='Parola trebuie să aibă minim 6 caractere.'; return; }
          if(p1.value!==p2.value){ eroare.textContent='Parolele nu se potrivesc.'; return; }
          buton.disabled=true; buton.textContent='Se pregătește...';
          await Cripto.seteazaParolaNoua(p1.value);
          curataAscultatori(); ascunde(); rezolva();
        } else {
          if(!p1.value){ eroare.textContent='Introdu parola.'; return; }
          buton.disabled=true; buton.textContent='Se verifică...';
          const ok=await Cripto.incearcaParola(p1.value);
          buton.disabled=false; buton.textContent='Deblochează';
          if(!ok){ eroare.textContent='Parolă greșită.'; p1.value=''; p1.focus(); return; }
          curataAscultatori(); ascunde(); rezolva();
        }
      }
      manClick=incearca; manP2=e=>{ if(e.key==='Enter') incearca(); };
      manP1=e=>{ if(e.key==='Enter'){ if(p2.style.display==='none') incearca(); else p2.focus(); } };
      buton.addEventListener('click', manClick);
      p1.addEventListener('keydown', manP1);
      p2.addEventListener('keydown', manP2);
    });
  }

  // reblocare (fără parolă nouă): doar cere parola din nou, nu recreează sistemul
  function reblocheaza(){
    Cripto.blocheaza();
    return asteaptaDeblocare();
  }

  // schimbarea parolei master: cere parola veche + una nouă (de două ori), apoi recriptează tot
  function schimbaParolaFlux(){
    return new Promise((rezolva)=>{
      curataAscultatori();
      p0.value=''; p1.value=''; p2.value=''; eroare.textContent='';
      p0.style.display=''; p1.style.display=''; p2.style.display='';
      p0.placeholder='Parola actuală';
      p1.placeholder='Parola nouă';
      p2.placeholder='Repetă parola nouă';
      titlu.textContent='Schimbă parola master';
      text.textContent='Toate fișierele vor fi recriptate automat cu noua parolă.';
      buton.textContent='Schimbă parola';
      nota.textContent='';
      anuleaza.style.display='';
      arata();
      setTimeout(()=>p0.focus(),300);

      async function incearca(){
        eroare.textContent='';
        if(!p0.value){ eroare.textContent='Introdu parola actuală.'; return; }
        if(p1.value.length<6){ eroare.textContent='Parola nouă trebuie să aibă minim 6 caractere.'; return; }
        if(p1.value!==p2.value){ eroare.textContent='Parolele noi nu se potrivesc.'; return; }
        buton.disabled=true; buton.textContent='Se recriptează...';
        const rez=await Cripto.schimbaParola(p0.value, p1.value, progres=>{ text.textContent='Se recriptează fișierele... '+progres; });
        buton.disabled=false; buton.textContent='Schimbă parola';
        if(!rez.succes){ eroare.textContent=rez.motiv; return; }
        curataAscultatori();
        p0.placeholder='Parola actuală'; // resetăm placeholder-ele pentru viitoarele deblocări
        ascunde(); rezolva({succes:true});
      }
      function laAnulare(){ curataAscultatori(); ascunde(); rezolva({succes:false, anulat:true}); }

      manClick=incearca; manAnul=laAnulare;
      manP0=e=>{ if(e.key==='Enter') p1.focus(); };
      manP1=e=>{ if(e.key==='Enter') p2.focus(); };
      manP2=e=>{ if(e.key==='Enter') incearca(); };
      buton.addEventListener('click', manClick);
      anuleaza.addEventListener('click', manAnul);
      p0.addEventListener('keydown', manP0);
      p1.addEventListener('keydown', manP1);
      p2.addEventListener('keydown', manP2);
    });
  }

  return {asteaptaDeblocare, reblocheaza, schimbaParolaFlux, arata};
})();

/* ---------- DEPOZIT: fișierele tale, persistente (IndexedDB) ----------
   Un "disc" simplu: fiecare fișier are o cale, un tip și conținut.
   Câmpul `continut` e criptat transparent cu cheia master (AES-GCM). */
const Depozit = (()=>{
  const NUME_BD='logos_depozit', MAGAZIE='fisiere';
  let bd=null;
  function deschide(){
    return new Promise((rez,resp)=>{
      const c=indexedDB.open(NUME_BD,1);
      c.onupgradeneeded=e=>{
        const d=e.target.result;
        if(!d.objectStoreNames.contains(MAGAZIE))
          d.createObjectStore(MAGAZIE,{keyPath:'cale'});
      };
      c.onsuccess=e=>{bd=e.target.result;rez();};
      c.onerror=e=>resp(e.target.error);
    });
  }
  function tx(mod){return bd.transaction(MAGAZIE,mod).objectStore(MAGAZIE);}
  // `continut` e criptat înainte să atingă discul, și decriptat la citire — transparent pentru restul aplicației
  function scrie(f){
    return new Promise((rez,resp)=>{
      (async()=>{
        try{
          const deSalvat=(f && typeof f.continut==='string') ? {...f, continut:await Cripto.encripteaza(f.continut)} : f;
          const r=tx('readwrite').put(deSalvat);
          r.onsuccess=()=>rez(f); r.onerror=()=>resp(r.error);
        }catch(e){ resp(e); }
      })();
    });
  }
  function citeste(cale){
    return new Promise((rez)=>{
      const r=tx('readonly').get(cale);
      r.onsuccess=()=>{
        (async()=>{
          const rec=r.result||null;
          if(rec && typeof rec.continut==='string') rec.continut=await Cripto.decripteaza(rec.continut);
          rez(rec);
        })();
      };
      r.onerror=()=>rez(null);
    });
  }
  function sterge(cale){return new Promise((rez)=>{const r=tx('readwrite').delete(cale);r.onsuccess=()=>rez(true);r.onerror=()=>rez(false);});}
  function toate(){
    return new Promise((rez)=>{
      const r=tx('readonly').getAll();
      r.onsuccess=()=>{
        (async()=>{
          const lista=(r.result||[]).filter(f=>!f.ascuns);
          for(const f of lista){ if(typeof f.continut==='string') f.continut=await Cripto.decripteaza(f.continut); }
          rez(lista);
        })();
      };
      r.onerror=()=>rez([]);
    });
  }
  // ca toate(), dar include și fișierele ascunse (ex: starea sistemului) — folosit la schimbarea parolei master
  function toateNefiltrate(){
    return new Promise((rez)=>{
      const r=tx('readonly').getAll();
      r.onsuccess=()=>{
        (async()=>{
          const lista=r.result||[];
          for(const f of lista){ if(typeof f.continut==='string') f.continut=await Cripto.decripteaza(f.continut); }
          rez(lista);
        })();
      };
      r.onerror=()=>rez([]);
    });
  }
  // ca toateNefiltrate(), dar FĂRĂ decriptare — pentru diagnostic (Doctor)
  function bruteTot(){
    return new Promise((rez)=>{
      const r=tx('readonly').getAll();
      r.onsuccess=()=>rez(r.result||[]);
      r.onerror=()=>rez([]);
    });
  }
  // simplifică un nume: fără diacritice, litere mici — ca să-l găsim ușor
  function simplu(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
  // găsește un fișier după nume, iertând diacritice și majuscule
  async function gaseste(nume){
    const t=await toate();
    const tinta=simplu(nume);
    return t.find(f=>simplu(f.cale)===tinta) || null;
  }
  return {deschide,scrie,citeste,sterge,toate,toateNefiltrate,bruteTot,gaseste,simplu};
})();

/* ---------- volumul unui fișier (în octeți → KB/MB) ---------- */
function volumFis(continut){
  // octeți reali (UTF-8), aproximați prin Blob când există
  let octeti;
  try{ octeti = new Blob([continut||'']).size; }
  catch(e){ octeti = (continut||'').length; }
  if(octeti < 1024) return octeti+' B';
  if(octeti < 1024*1024) return (octeti/1024).toFixed(1)+' KB';
  return (octeti/(1024*1024)).toFixed(2)+' MB';
}

/* ---------- MEMORIA: starea sistemului, persistentă ----------
   Logos își amintește ce era deschis și unde am rămas.
   Folosim o cheie simplă în același IndexedDB, prin localStorage-like
   peste Depozit (un fișier ascuns de stare). */
const Memorie = (()=>{
  const CHEIE='__stare_logos';
  let stare={ ultimaApp:null, ctx:null };
  async function incarca(){
    try{
      const f=await Depozit.citeste(CHEIE);
      if(f && f.continut) stare=JSON.parse(f.continut);
    }catch(e){}
    return stare;
  }
  async function salveaza(noua){
    stare={...stare,...noua};
    try{
      await Depozit.scrie({cale:CHEIE,tip:'stare',continut:JSON.stringify(stare),ascuns:true});
    }catch(e){}
  }
  function ia(){ return stare; }
  return {incarca,salveaza,ia};
})();

/* ---------- NUCLEUL: pornește lumea, găzduiește aplicații ---------- */
const Nucleu = (()=>{
  const aplicatii={};      // contractul: fiecare app se înregistrează aici
  function inregistreaza(app){ aplicatii[app.id]=app; }
  function lista(){ return Object.values(aplicatii); }
  function lanseaza(id, ctx={}){
    const app=aplicatii[id];
    if(!app){ console.warn('Aplicație necunoscută:',id); return; }
    deschideFereastra(app.nume, app.montare, ctx, {appId:id, iconita:app.iconita});
    Memorie.salveaza({ultimaApp:id, ctx:ctx&&ctx.fisier?{fisier:ctx.fisier}:null});
  }
  return {inregistreaza,lista,lanseaza};
})();

/* ---------- GESTIONARUL DE FERESTRE: mai multe vii deodată ----------
   Fiecare fereastră deschisă rămâne în viață (în DOM). Doar una e
   vizibilă. Comutatorul (bara) le arată pe toate și le aduce în față. */
const stratFerestre=document.getElementById('ferestre');
const comutator=document.getElementById('comutator');

// fiecare intrare: {id, nume, iconita, el, corp, curatenie}
const ferestreDeschise=[];
let activaId=null;

function randeazaComutator(){
  comutator.innerHTML='';
  if(!ferestreDeschise.length){ return; }
  for(const f of ferestreDeschise){
    const fila=document.createElement('div');
    fila.className='fila'+(f.id===activaId?' activa':'');
    fila.innerHTML=`<span class="ft">${(f.nume||'').replace(/^[▢▷•♪⌂▤]\s*/,'')}</span><span class="fx">✕</span>`;
    fila.querySelector('.fx').addEventListener('click',e=>{ e.stopPropagation(); inchideFereastraId(f.id); });
    fila.addEventListener('click',()=>aratoFereastra(f.id));
    comutator.appendChild(fila);
  }
}

function aratoFereastra(id){
  document.body.classList.remove('acasa');
  const birou=document.body.classList.contains('birou');
  for(const f of ferestreDeschise){
    if(birou){
      // în mod birou toate rămân vizibile alăturat; doar marcăm activa
      f.el.classList.add('deschis'); f.el.classList.remove('fundal');
    } else {
      if(f.id===id){ f.el.classList.add('deschis'); f.el.classList.remove('fundal'); }
      else { f.el.classList.remove('deschis'); f.el.classList.add('fundal'); }
    }
  }
  activaId=id;
  // marchează vizual fereastra activă (util în mod birou)
  for(const f of ferestreDeschise){ f.el.classList.toggle('activa', f.id===id); }
  randeazaComutator();
  if(birou) asazaManere();
  const f=ferestreDeschise.find(x=>x.id===id);
  if(f) Memorie.salveaza({ultimaApp:f.appId, ctx:f.ctx||null, deschise:ferestreDeschise.map(x=>x.appId)});
}

// deschide o aplicație. Dacă e deja deschisă, o aduce în față (nu o dublează).
function deschideFereastra(nume, montare, ctx, meta={}){
  const appId=meta.appId||nume;
  // dacă aplicația e deja deschisă, doar comută la ea
  const exist=ferestreDeschise.find(f=>f.appId===appId);
  if(exist){ aratoFereastra(exist.id); return; }

  const id='f'+Date.now()+Math.random().toString(36).slice(2,6);
  const el=document.createElement('div');
  el.className='fereastra';
  el.innerHTML=`<div class="cap-fereastra"><span class="titlu">${(nume||'').replace(/^[▢▷•♪⌂▤]\s*/,'')}</span><span class="x">✕</span></div><div class="corp-fereastra"></div>`;
  stratFerestre.appendChild(el);
  // ✕ închide fereastra. Pe Safari/iOS, „click" pe un <span> nu se declanșează
  // de fiecare dată; „pointerup" e sigur pe toate.
  const butonX = el.querySelector('.x');
  butonX.addEventListener('pointerup',ev=>{ ev.stopPropagation(); ev.preventDefault(); inchideFereastraId(id); });
  butonX.addEventListener('click',ev=>{ ev.stopPropagation(); ev.preventDefault(); });
  el.addEventListener('pointerdown',()=>{ if(document.body.classList.contains('birou')){ activaId=id; randeazaComutator(); } });
  const corp=el.querySelector('.corp-fereastra');

  const curatenie = montare(corp, ctx||{}) || null;
  const intrare={id, appId, nume, iconita:meta.iconita, ctx, el, corp, curatenie};
  ferestreDeschise.push(intrare);
  // fereastră nouă în mod birou → împarte spațiul din nou, egal
  if(document.body.classList.contains('birou')) reseteazaLatimi();
  // mică întârziere ca tranziția să se vadă
  requestAnimationFrame(()=>aratoFereastra(id));
}

function inchideFereastraId(id){
  const i=ferestreDeschise.findIndex(f=>f.id===id);
  if(i===-1) return;
  const f=ferestreDeschise[i];
  if(f.curatenie){ try{f.curatenie();}catch(e){} }
  f.el.classList.remove('deschis');
  const birou=document.body.classList.contains('birou');
  // în mod birou scoatem fereastra imediat (altfel golul rămâne 300ms)
  if(birou){ try{f.el.remove();}catch(e){} }
  else { setTimeout(()=>{ try{f.el.remove();}catch(e){} },300); }
  ferestreDeschise.splice(i,1);
  // arată următoarea, dacă mai e
  if(ferestreDeschise.length){
    aratoFereastra(ferestreDeschise[ferestreDeschise.length-1].id);
  } else {
    activaId=null;
    randeazaComutator();
    Memorie.salveaza({ultimaApp:null, ctx:null, deschise:[]});
  }
  if(birou){ reseteazaLatimi(); asazaManere(); }
}

// ---- TEMPORIZATOARE: numărătoare inversă vizibilă în bara de sus ----
const Temporizatoare = (function(){
  const lista=[];   // {id, text, sfarsit, el}
  let ceasTic=null;

  function format(ms){
    if(ms<0) ms=0;
    const s=Math.round(ms/1000);
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
    if(h>0) return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    return m+':'+String(sec).padStart(2,'0');
  }
  function randeaza(){
    const gazda=document.getElementById('temporizatoare');
    if(!gazda) return;
    gazda.innerHTML='';
    for(const t of lista){
      const ramas=t.sfarsit-Date.now();
      const el=document.createElement('div');
      el.className='temp-chip'+(ramas<=60000?' aproape':'');
      el.innerHTML=`<span class="temp-ceas">⏱ ${format(ramas)}</span>`+
                   (t.text?`<span class="temp-txt">${t.text}</span>`:'')+
                   `<span class="temp-x" title="anulează">✕</span>`;
      el.querySelector('.temp-x').addEventListener('click',e=>{ e.stopPropagation(); anuleaza(t.id); });
      gazda.appendChild(el);
    }
  }
  function tic(){
    const acum=Date.now();
    for(let i=lista.length-1;i>=0;i--){
      if(lista[i].sfarsit<=acum){
        const t=lista[i];
        lista.splice(i,1);
        sunaSiAnunta(t.text);
      }
    }
    randeaza();
    if(!lista.length && ceasTic){ clearInterval(ceasTic); ceasTic=null; }
  }
  function sunaSiAnunta(text){
    try{ if(navigator.vibrate) navigator.vibrate([160,80,160,80,260]); }catch(e){}
    try{
      const ctxA=new (window.AudioContext||window.webkitAudioContext)();
      [880,1100,880].forEach((f,i)=>{
        const o=ctxA.createOscillator(), g=ctxA.createGain();
        o.connect(g); g.connect(ctxA.destination);
        o.frequency.value=f; g.gain.value=0.07;
        o.start(ctxA.currentTime+i*0.22);
        o.stop(ctxA.currentTime+i*0.22+0.18);
      });
      setTimeout(()=>ctxA.close(),1200);
    }catch(e){}
    setTimeout(()=>alert('⏰  '+(text||'Timpul a expirat!')),120);
  }
  function porneste(minute, text){
    const id='t'+Date.now()+Math.random().toString(36).slice(2,5);
    lista.push({id, text:text||'', sfarsit: Date.now()+minute*60000});
    randeaza();
    if(!ceasTic) ceasTic=setInterval(tic,1000);
    return id;
  }
  function anuleaza(id){
    const i=lista.findIndex(t=>t.id===id);
    if(i>-1){ lista.splice(i,1); randeaza(); }
    if(!lista.length && ceasTic){ clearInterval(ceasTic); ceasTic=null; }
  }
  function cate(){ return lista.length; }
  return {porneste, anuleaza, cate, randeaza};
})();

async function deschideMeniuStart(){

  }

  // fișiere recente (ultimele 5 atinse)
  let recente='';
  try{
    const toate=(await Depozit.toate())
      .filter(f=>f.tip!=='folder'&&f.tip!=='html'&&f.tip!=='backup')
      .sort((a,b)=>(b.creat||0)-(a.creat||0)).slice(0,5);

      recente+=`<div class="ms-r mic" data-fis="${f.cale}">

  m.innerHTML=`

    <div class="ms-linie"></div>

    <div class="ms-r" data-act="acasa"><span class="ms-ic">⌂</span><span>Ecranul de acasă</span><span class="ms-scurt">Esc</span></div>
    ${ferestreDeschise.length?'<div class="ms-r rosu" data-act="inchide-tot"><span class="ms-ic">✕</span><span>Închide toate ferestrele</span></div>':''}
    <div class="ms-linie"></div>
    <div class="ms-r" data-act="blocheaza"><span class="ms-ic">🔒</span><span>Blochează acum</span></div>
    <div class="ms-r" data-act="schimba-parola"><span class="ms-ic">🔑</span><span>Schimbă parola master</span></div>
  `;
  document.body.appendChild(m);

  // așază-l sub butonul LogOS
  const marca=document.getElementById('marca').getBoundingClientRect();
  m.style.left = Math.max(8, marca.left)+'px';
  m.style.top  = (marca.bottom+6)+'px';

  m.querySelectorAll('.ms-r').forEach(r=>{
    r.addEventListener('click',async()=>{
      const app=r.dataset.app, fis=r.dataset.fis, act=r.dataset.act;
      m.remove();
      if(app){ Nucleu.lanseaza(app); }
      else if(fis){ const f=await Depozit.gaseste(fis); if(f) deschideCuApp(f); }
      else if(act==='acasa'){ mergiAcasa(); }
      else if(act==='nou'){ fisierNouGlobal(); }
      else if(act==='inchide-tot'){ [...ferestreDeschise].forEach(f=>inchideFereastraId(f.id)); }
      else if(act==='blocheaza'){ window.reblocheazaAcum(); }
      else if(act==='schimba-parola'){
        const rez=await EcranLacat.schimbaParolaFlux();
        if(rez && rez.succes) alert('Parola master a fost schimbată. Toate fișierele au fost recriptate.');
      }
    });
  });

  // clic în afară sau Esc → închide
  setTimeout(()=>{
    const inchide=ev=>{
      if(!m.contains(ev.target)){ m.remove(); document.removeEventListener('click',inchide); }
    };
    document.addEventListener('click',inchide);
  },10);
}

   CONTRACTUL unei aplicații:
   { id, nume, iconita, montare(corp, ctx) }
