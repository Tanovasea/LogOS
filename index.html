/* ---------- mini-Markdown pentru cititor ---------- */
function md2html(md){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return md.trim().split('\n').map(l=>{
    let t=l.trim();
    if(t.startsWith('## '))return '<h2>'+esc(t.slice(3))+'</h2>';
    if(t.startsWith('# '))return '<h1>'+esc(t.slice(2))+'</h1>';
    if(t==='')return '';
    return '<p>'+esc(t).replace(/`(.+?)`/g,'<code>$1</code>')+'</p>';
  }).join('');
}

/* ===================== APLICAȚIA: FIȘIERE ===================== */
Nucleu.inregistreaza({
  id:'fisiere', nume:'Fișiere', iconita:'▤',
  montare(corp){
    const root=document.createElement('div');
    root.className='fisiere';
    corp.appendChild(root);
    let caleCurenta='';   // '' = acasă; 'Jurnal/' = în folderul Jurnal
    // fără meniul nativ Android (căutare pe web) la apăsare lungă
    root.addEventListener('contextmenu',e=>e.preventDefault());
    root._rerandeaza=()=>randeaza();   // ca să reacționeze la schimbarea modului
    root._calea=()=>caleCurenta;       // unde suntem acum (pentru drop din sistem)
    randeaza();

    // ---- apăsare lungă (touch) SAU clic-dreapta (laptop) ----
    function apasareLunga(el, fn){
      let t=null,x0=0,y0=0,eDeget=false,amDeschisMeniu=false;
      el.style.webkitTouchCallout='none';
      el.addEventListener('pointerdown',e=>{
        if(e.pointerType==='mouse' && e.button!==0) return;
        eDeget = (e.pointerType!=='mouse');
        amDeschisMeniu=false;
        x0=e.clientX;y0=e.clientY;
        t=setTimeout(()=>{
          t=null;
          amDeschisMeniu=true;
          try{ if(navigator.vibrate) navigator.vibrate(18); }catch(_){}
          fn(e);
        },520);
      });
      const gata=()=>{if(t){clearTimeout(t);t=null;}};
      el.addEventListener('pointerup',gata);
      el.addEventListener('pointercancel',gata);
      el.addEventListener('pointermove',e=>{
        const prag = eDeget ? 22 : 10;
        if(Math.abs(e.clientX-x0)>prag||Math.abs(e.clientY-y0)>prag) gata();
      });
      // pe iOS/Android apăsarea lungă cheamă meniul browserului — îl oprim,
      // dar NU oprim clicul obișnuit (altfel nimic nu mai răspunde la atingere)
      el.addEventListener('contextmenu',e=>{
        e.preventDefault();
        if(!eDeget){ e.stopPropagation(); fn(e); }   // pe mouse: clic-dreapta = meniul nostru
      });
      // dacă am deschis meniul prin apăsare lungă, înghițim clicul care urmează
      el.addEventListener('click',e=>{
        if(amDeschisMeniu){ e.stopPropagation(); e.preventDefault(); amDeschisMeniu=false; }
      },true);
    }

    // ---- meniu de jos ----
    function meniu(titlu, optiuni){
      // curăță orice meniu rămas (pe ecran, oriunde ar fi)
      document.querySelectorAll('.fm-meniu').forEach(x=>x.remove());
      const m=document.createElement('div'); m.className='fm-meniu';
      const c=document.createElement('div'); c.className='fm-meniu-c';
      if(titlu){const h=document.createElement('div');h.className='fm-meniu-t';h.textContent=titlu;c.appendChild(h);}
      for(const o of optiuni){
        const b=document.createElement('div'); b.className='fm-meniu-b'+(o.rosu?' rosu':'');
        b.textContent=o.text;
        // închidem meniul ÎNTÂI, apoi rulăm acțiunea (care poate deschide alt meniu)
        b.addEventListener('click',ev=>{
          ev.stopPropagation();
          m.remove();
          if(o.fn) setTimeout(()=>o.fn(),0);
        });
        c.appendChild(b);
      }
      const x=document.createElement('div'); x.className='fm-meniu-b anuleaza'; x.textContent='Anulează';
      x.addEventListener('click',ev=>{ev.stopPropagation(); m.remove();});
      c.appendChild(x); m.appendChild(c);
      m.addEventListener('click',e=>{if(e.target===m)m.remove();});
      document.body.appendChild(m);   // pe ecran, nu în fereastră
    }

    async function randeaza(){
      const toate=await Depozit.toate();
      root.querySelectorAll('.fm-bara,.fm-corp,.gol').forEach(x=>x.remove());
      document.querySelectorAll('.fm-meniu').forEach(x=>x.remove());

      const bara=document.createElement('div'); bara.className='fm-bara';
      if(caleCurenta){
        const inapoi=document.createElement('span'); inapoi.className='fm-inapoi'; inapoi.textContent='← înapoi';
        inapoi.addEventListener('click',()=>{caleCurenta='';randeaza();});
        // tragi un fișier pe „înapoi" → îl scoți din folder, în rădăcină
        inapoi.addEventListener('dragover',e=>{
          if(!window.__caleTrasa) return;
          e.preventDefault(); e.stopPropagation(); inapoi.classList.add('tinta');
        });
        inapoi.addEventListener('dragenter',e=>{
          if(!window.__caleTrasa) return;
          e.preventDefault(); inapoi.classList.add('tinta');
        });
        inapoi.addEventListener('dragleave',()=>inapoi.classList.remove('tinta'));
        inapoi.addEventListener('drop',async e=>{
          e.preventDefault(); e.stopPropagation();
          inapoi.classList.remove('tinta');
          let cale='';
          try{ cale=e.dataTransfer.getData('text/logos-fisier'); }catch(_){}
          if(!cale) cale = window.__caleTrasa || '';
          if(!cale) return;
          const f=await Depozit.gaseste(cale);
          if(f) await mutaIn(f, '');
        });
        bara.appendChild(inapoi);
      }
      const drum=document.createElement('span'); drum.className='fm-drum';
      drum.textContent='/acasă'+(caleCurenta?('/'+caleCurenta.replace(/\/$/,'')):'');
      bara.appendChild(drum);
      root.appendChild(bara);

      const foldere=new Set();
      for(const f of toate){
        if(f.tip==='folder') foldere.add(f.cale.replace(/\/$/,'')+'/');
        else if(f.cale.includes('/')) foldere.add(f.cale.split('/')[0]+'/');
      }
      const eDoc=x=>x.tip!=='folder'&&x.tip!=='html'&&x.tip!=='backup';

      // corp: grila de fișiere (fără panou lateral — fura spațiu în ferestre înguste)
      const corpFm=document.createElement('div'); corpFm.className='fm-corp';
      root.appendChild(corpFm);

      const grila=document.createElement('div'); grila.className='fm-grila';
      corpFm.appendChild(grila);
      apasareLunga(grila, e=>{
        if(e.target.closest('.fm-item')) return;
        meniu('Creează aici', [
          {text:'📁  Folder nou', fn:folderNou},
          {text:'▢  Fișier nou', fn:fisierNou},
        ]);
      });
      let gol=true;

      if(!caleCurenta){
        for(const fol of [...foldere].sort()){
          gol=false;
          const nr=toate.filter(x=>eDoc(x)&&x.cale.startsWith(fol)).length;
          const el=document.createElement('div'); el.className='fm-item';
          const rec=toate.find(x=>x.tip==='folder'&&x.cale===fol);
          el.innerHTML=`<div class="fm-ic-folder">${rec&&rec.parola?'<span class="fm-lacat">🔒</span>':''}</div><div class="fm-nume">${fol.replace(/\/$/,'')}</div><div class="fm-meta">${nr} fișier(e)</div>`;
          el.addEventListener('click',()=>intraInFolder(fol));
          apasareLunga(el,()=>meniuFolder(fol));
          // ---- primește fișiere trase peste el ----
          el.addEventListener('dragover',e=>{
            if(!window.__caleTrasa) return;
            e.preventDefault(); e.stopPropagation();
            e.dataTransfer.dropEffect='move';
            el.classList.add('tinta');
          });
          el.addEventListener('dragenter',e=>{
            if(!window.__caleTrasa) return;
            e.preventDefault(); el.classList.add('tinta');
          });
          el.addEventListener('dragleave',()=>el.classList.remove('tinta'));
          el.addEventListener('drop',async e=>{
            e.preventDefault(); e.stopPropagation();
            el.classList.remove('tinta');
            let cale='';
            try{ cale=e.dataTransfer.getData('text/logos-fisier'); }catch(_){}
            if(!cale) cale = window.__caleTrasa || '';
            if(!cale) return;
            const f=await Depozit.gaseste(cale);
            if(f) await mutaIn(f, fol);
          });
          grila.appendChild(el);
        }
        const rad=toate.filter(x=>eDoc(x)&&!x.cale.includes('/'));
        rad.sort((a,b)=>a.cale.localeCompare(b.cale));
        for(const f of rad){gol=false;grila.appendChild(itemFisier(f,f.cale));}
      } else {
        const din=toate.filter(x=>eDoc(x)&&x.cale.startsWith(caleCurenta));
        din.sort((a,b)=>a.cale.localeCompare(b.cale));
        for(const f of din){gol=false;grila.appendChild(itemFisier(f,f.cale.slice(caleCurenta.length)));}
      }

      if(gol || (!grila.children.length)){
        const g=document.createElement('div'); g.className='gol';
        g.innerHTML=caleCurenta?'Folderul e gol.\nȚine apăsat pe gol ca să creezi ceva.':'Niciun fișier aici.\nȚine apăsat pe gol (sau clic-dreapta) ca să creezi.';
        grila.appendChild(g);
      }
    }

    function itemFisier(f, numeAfisat){
      const ext=f.cale.includes('.')?('.'+f.cale.split('.').pop().toLowerCase().slice(0,4)):'';
      const el=document.createElement('div'); el.className='fm-item';
      el.innerHTML=`<div class="fm-ic-fisier">${f.parola?'<span class="fm-lacat">🔒</span>':''}<span class="fm-ext">${ext}</span></div>
        <div class="fm-nume">${numeAfisat}</div><div class="fm-meta">${volumFis(f.continut)}</div>`;
      el.addEventListener('click',()=>deschideCuApp(f));
      apasareLunga(el,()=>meniuFisier(f));
      // ---- tragere: DOAR cu mouse. Pe atingere, „draggable" fură apăsarea lungă. ----
      if(areMouse()){
        el.draggable=true;
        el.addEventListener('dragstart',e=>{
          e.dataTransfer.setData('text/logos-fisier', f.cale);
          e.dataTransfer.setData('text/plain', f.cale);
          e.dataTransfer.effectAllowed='all';
          window.__caleTrasa = f.cale;
          el.classList.add('se-trage');
          document.body.classList.add('trag-fisier');
        });
        el.addEventListener('dragend',()=>{
          window.__caleTrasa = null;
          el.classList.remove('se-trage');
          document.body.classList.remove('trag-fisier');
          document.querySelectorAll('.tinta,.term-tinta').forEach(x=>x.classList.remove('tinta','term-tinta'));
        });
      }
      return el;
    }

    async function intraInFolder(fol){
      const rec=(await Depozit.toate()).find(x=>x.tip==='folder'&&x.cale===fol);
      if(rec&&rec.parola){
        const p=prompt('Parola pentru '+fol.replace(/\/$/,'')+':');
        if(p===null) return;
        if(p!==rec.parola){ alert('Parolă greșită.'); return; }
      }
      caleCurenta=fol; randeaza();
    }

    function meniuFisier(f){
      meniu(f.cale, [
        {text:'Deschide', fn:()=>deschideCuApp(f)},
        {text:'Redenumește', fn:()=>redenumesteFisier(f)},
        {text:'Mută în folder…', fn:()=>alegeMutare(f)},
        {text:f.parola?'Scoate parola':'Pune parolă', fn:()=>paroleaza(f)},
        {text:'Șterge', rosu:true, fn:async()=>{
          if(!confirm('Ștergi „'+f.cale+'"?')) return;
          await Depozit.sterge(f.cale); randeaza();
        }},
      ]);
    }
    async function redenumesteFisier(f){
      if(f.parola){
        const v=prompt('Parola pentru '+f.cale+':');
        if(v===null) return;
        if(v!==f.parola){ alert('Parolă greșită.'); return; }
      }
      const baza=f.cale.split('/').pop();
      const folder=f.cale.includes('/')?f.cale.slice(0,f.cale.lastIndexOf('/')+1):'';
      let nume=prompt('Nume nou:', baza);
      if(!nume) return; nume=nume.trim();
      if(!nume || nume===baza) return;
      if(!nume.includes('.') && baza.includes('.')) nume+='.'+baza.split('.').pop();
      const nou=folder+nume;
      if(await Depozit.gaseste(nou)){ alert('Există deja un fișier cu numele ăsta.'); return; }
      const v=f.cale; await Depozit.sterge(v); f.cale=nou; await Depozit.scrie(f);
      randeaza();
    }
    async function meniuFolder(fol){
      const toate=await Depozit.toate();
      let rec=toate.find(x=>x.tip==='folder'&&x.cale===fol);
      meniu(fol.replace(/\/$/,''), [
        {text:'Deschide', fn:()=>intraInFolder(fol)},
        {text:'Redenumește', fn:()=>redenumesteFolder(fol, rec)},
        {text:(rec&&rec.parola)?'Scoate parola':'Pune parolă', fn:async()=>{
          if(!rec){ rec={cale:fol,tip:'folder',continut:'',creat:Date.now()}; }
          await paroleaza(rec);
        }},
        {text:'Șterge folderul (cu tot)', rosu:true, fn:async()=>{
          const cate=toate.filter(x=>x.tip!=='folder'&&x.cale.startsWith(fol)).length;
          if(!confirm('Ștergi folderul „'+fol.replace(/\/$/,'')+'" și cele '+cate+' fișier(e) din el?')) return;
          for(const x of toate){ if(x.cale===fol||x.cale.startsWith(fol)) await Depozit.sterge(x.cale); }
          if(caleCurenta===fol) caleCurenta='';
          randeaza();
        }},
      ]);
    }
    async function redenumesteFolder(fol, rec){
      if(rec&&rec.parola){
        const v=prompt('Parola pentru folderul '+fol.replace(/\/$/,'')+':');
        if(v===null) return;
        if(v!==rec.parola){ alert('Parolă greșită.'); return; }
      }
      const vechiNume=fol.replace(/\/$/,'');
      let nume=prompt('Nume nou pentru folder:', vechiNume);
      if(!nume) return; nume=nume.trim().replace(/\/+$/,'');
      if(!nume || nume===vechiNume) return;
      const nouFol=nume+'/';
      const toate=await Depozit.toate();
      if(toate.some(x=>x.cale===nouFol || x.cale.startsWith(nouFol))){ alert('Există deja un folder cu numele ăsta.'); return; }
      // mută toate fișierele din folder + intrarea folderului
      for(const x of toate){
        if(x.cale===fol){ await Depozit.sterge(x.cale); x.cale=nouFol; await Depozit.scrie(x); }
        else if(x.cale.startsWith(fol)){ const rest=x.cale.slice(fol.length); await Depozit.sterge(x.cale); x.cale=nouFol+rest; await Depozit.scrie(x); }
      }
      if(caleCurenta===fol) caleCurenta=nouFol;
      randeaza();
    }
    async function paroleaza(f){
      if(f.parola){
        const v=prompt('Parola actuală (ca să o scoți):');
        if(v===null) return;
        if(v!==f.parola){ alert('Parolă greșită.'); return; }
        delete f.parola;
        await Depozit.scrie(f);
        alert('Parola a fost scoasă.');
      } else {
        const p=prompt('Parola nouă (Atenție: e un lacăt, nu un seif — nu uita parola):');
        if(!p) return;
        f.parola=p;
        await Depozit.scrie(f);
      }
      randeaza();
    }
    async function alegeMutare(f){
      const toate=await Depozit.toate();
      const foldere=new Set();
      for(const x of toate){
        if(x.tip==='folder') foldere.add(x.cale.replace(/\/$/,'')+'/');
        else if(x.cale.includes('/')) foldere.add(x.cale.split('/')[0]+'/');
      }
      const opt=[{text:'⌂  acasă (rădăcină)', fn:()=>mutaIn(f,'')}];
      for(const fol of [...foldere].sort()){
        opt.push({text:'📁  '+fol.replace(/\/$/,''), fn:()=>mutaIn(f,fol)});
      }
      meniu('Mută „'+f.cale+'" în:', opt);
    }
    async function mutaIn(f, folder){
      const baza=f.cale.split('/').pop();
      const nou=folder+baza;
      if(nou===f.cale){ return; }
      if(await Depozit.gaseste(nou)){ alert('Există deja un fișier cu numele ăsta acolo.'); return; }
      const v=f.cale; await Depozit.sterge(v); f.cale=nou; await Depozit.scrie(f);
      randeaza();
    }
    async function folderNou(){
      let nume=prompt('Numele folderului:');
      if(!nume) return; nume=nume.trim().replace(/\/+$/,'');
      if(!nume) return;
      const cale=nume+'/';
      if(await Depozit.gaseste(cale)){ alert('Există deja.'); return; }
      const rec={cale,tip:'folder',continut:'',creat:Date.now()};
      const p=prompt('Parolă pentru folder (lasă gol dacă nu vrei):');
      if(p) rec.parola=p;
      await Depozit.scrie(rec); randeaza();
    }
    async function fisierNou(){
      let nume=prompt('Numele fișierului (ex: note.md):');
      if(!nume) return; nume=nume.trim();
      if(!nume) return;
      if(!nume.includes('.')) nume+='.md';
      const cale=caleCurenta+nume;
      if(await Depozit.gaseste(cale)){ alert('Există deja.'); return; }
      const tip=nume.endsWith('.md')?'md':nume.endsWith('.html')?'html':'text';
      const f={cale,tip,continut:'',creat:Date.now()};
      const p=prompt('Parolă pentru fișier (lasă gol dacă nu vrei):');
      if(p) f.parola=p;
      await Depozit.scrie(f); randeaza();
    }
  }
});

/* ============================================================
   PUNTEA OASPETE ↔ SISTEM
   Orice aplicație .html rulează ca oaspete într-o fereastră Logos.
   Implicit e izolată (sigură), dar Logos îi întinde o punte:
   dacă aplicația vrea, poate cere/salva/lista fișiere din depozit.

   Contract (mesaje postMessage de la oaspete către Logos):
     {logos:'cere-fisier'}              → primește fișierul asociat
     {logos:'salveaza', continut, nume} → salvează în depozit
     {logos:'listeaza'}                 → primește lista fișierelor
     {logos:'gata'}                     → oaspetele e gata (trimitem fișierul)
   Logos răspunde oaspetelui cu:
     {logos:'fisier', continut, nume}
     {logos:'salvat', nume}
     {logos:'lista', fisiere:[...]}
   ============================================================ */

// rulează un oaspete (.html) într-o fereastră, cu puntea activă.
// fisierAsociat (opțional): fișierul pe care oaspetele îl deschide.
function ruleazaOaspete(numeApp, cod, fisierAsociat){
  deschideFereastra('▷ '+numeApp,(corp)=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='height:100%;display:flex;flex-direction:column;background:#fff';
    const ifr=document.createElement('iframe');
    ifr.setAttribute('sandbox','allow-scripts allow-forms allow-modals allow-popups allow-pointer-lock allow-same-origin allow-downloads');
    ifr.style.cssText='flex:1;width:100%;border:none;background:#fff';
    wrap.appendChild(ifr);
    corp.appendChild(wrap);

    // Folosim blob: în loc de srcdoc.
    // Pe deasupra, aplicațiile-oaspete cer adesea localStorage — dar într-un iframe
    // sandboxed browserul îl refuză („Access is denied"), iar aplicația moare (pagină albă).
    // Le dăm o cămară proprie, care trăiește în memoria ferestrei și se salvează în Logos,
    // criptată cu aceeași cheie master ca restul sistemului.
    const cheieCamara = 'camara_oaspete_'+numeApp;

    let adresaBlob=null;

    // pornirea e async (trebuie să decriptăm cămara înainte să construim iframe-ul),
    // dar deschideFereastra așteaptă o funcție de curățenie *sincronă* mai jos —
    // de-asta lucrul async stă izolat aici, într-un IIFE separat.
    (async()=>{
      let camara={};
      try{
        const brut=localStorage.getItem(cheieCamara);
        if(brut) camara=JSON.parse(await Cripto.decripteaza(brut));
      }catch(e){ camara={}; }

      const petic = `<script>
      (function(){
        // cămară falsă, ca aplicația să nu moară în iframe sandboxed
        var date = ${JSON.stringify(camara)};
        function salveaza(){
          try{ parent.postMessage({logosCamara:${JSON.stringify(cheieCamara)}, date:date},'*'); }catch(e){}
        }
        var falsa = {
          getItem: function(k){ return Object.prototype.hasOwnProperty.call(date,k) ? String(date[k]) : null; },
          setItem: function(k,v){ date[String(k)]=String(v); salveaza(); },
          removeItem: function(k){ delete date[String(k)]; salveaza(); },
          clear: function(){ date={}; salveaza(); },
          key: function(i){ return Object.keys(date)[i] || null; },
          get length(){ return Object.keys(date).length; }
        };
        try{
          var proba = window.localStorage; proba.getItem('x');   // merge? îl lăsăm în pace
        }catch(e){
          try{ Object.defineProperty(window,'localStorage',{value:falsa,configurable:true}); }catch(_){}
          try{ Object.defineProperty(window,'sessionStorage',{value:falsa,configurable:true}); }catch(_){}
        }
      })();
      <\/script>`;

      const codCuPetic = cod.replace(/<head([^>]*)>/i, '<head$1>'+petic);
      const codFinal = (codCuPetic!==cod) ? codCuPetic : (petic + cod);

      try{
        const pachet=new Blob([codFinal],{type:'text/html'});
        adresaBlob=URL.createObjectURL(pachet);
        ifr.src=adresaBlob;
      }catch(e){
        ifr.srcdoc=codFinal;   // rezervă
      }
    })();

    // ascultăm salvările din cămara oaspetelui — criptăm înainte să atingă discul
    function laCamara(ev){
      const d=ev.data;
      if(!d || d.logosCamara!==cheieCamara) return;
      (async()=>{
        try{
          const criptat=await Cripto.encripteaza(JSON.stringify(d.date||{}));
          localStorage.setItem(cheieCamara, criptat);
        }catch(e){}
      })();
    }
    window.addEventListener('message', laCamara);

    // puntea: ascultă mesajele DOAR de la acest iframe
    function raspunde(msg){ try{ ifr.contentWindow.postMessage(msg,'*'); }catch(e){} }
    async function laMesaj(ev){
      if(ev.source!==ifr.contentWindow) return; // doar de la oaspetele nostru
      const d=ev.data||{};
      if(!d || typeof d.logos!=='string') return;
      try{
        if(d.logos==='gata' || d.logos==='cere-fisier'){
          if(fisierAsociat) raspunde({logos:'fisier', continut:fisierAsociat.continut||'', nume:fisierAsociat.cale});
        }
        else if(d.logos==='salveaza' && typeof d.continut==='string'){
          const nume = d.nume || (fisierAsociat?fisierAsociat.cale:('document-'+Date.now()+'.md'));
          const ex = await Depozit.gaseste(nume);
          const f = ex || {cale:nume, tip:(nume.split('.').pop()||'text'), creat:Date.now()};
          f.continut=d.continut;
          await Depozit.scrie(f);
          if(fisierAsociat && fisierAsociat.cale===f.cale) fisierAsociat.continut=d.continut;
          raspunde({logos:'salvat', nume:f.cale});
        }
        else if(d.logos==='listeaza'){
          const t=await Depozit.toate();
          raspunde({logos:'lista', fisiere:t.map(x=>({nume:x.cale, tip:x.tip}))});
        }
      }catch(e){ console.warn('Punte oaspete:',e); }
    }
    window.addEventListener('message',laMesaj);
    // curățenie când fereastra se închide
    return ()=>{
      window.removeEventListener('message',laMesaj);
      window.removeEventListener('message',laCamara);
      if(adresaBlob){ try{ URL.revokeObjectURL(adresaBlob); }catch(e){} }
    };
  },{}, {appId:'oaspete:'+numeApp+(fisierAsociat?(':'+fisierAsociat.cale):''), iconita:'▷'});
}

/* ---------- ASOCIERI: ce oaspete deschide ce tip de fișier ----------
   Poți instala o aplicație .html și o desemnezi handler pentru o extensie
   prin terminal: `asociaza md AplicatiaMea.html`. Altfel, text simplu. */
async function deschideCuApp(f){
  // fișier cu parolă → cere-o (lacăt, nu seif — conținutul nu e criptat)
  if(f.parola){
    const p=prompt('Parola pentru '+f.cale+':');
    if(p===null) return;
    if(p!==f.parola){ alert('Parolă greșită.'); return; }
  }
  // un .html e o aplicație-oaspete → o rulează direct
  if(f.tip==='html'){ ruleazaOaspete(f.cale, f.continut); return; }
  // caută un handler instalat pentru extensie (din memoria sistemului)
  const ext=(f.cale||'').toLowerCase().split('.').pop();
  const asoc=(Memorie.ia().asocieri)||{};
  const numeApp=asoc[ext];
  if(numeApp){
    const app=(await Depozit.toate()).find(x=>x.tip==='html' && x.cale===numeApp);
    if(app){ ruleazaOaspete(app.cale, app.continut, f); return; }
  }
  // rezervă: vizualizare text cu fundal reglabil (aceleași teme)
  deschideVizualizareSimpla(f);
}

// vizualizare text/markdown cu paletă completă (ca aplicația ta model)
const PALETA_BG_VIZ=['#0d1117','#16302b','#1e2530','#2a2620','#3a3326','#c9bfad','#e9dfc9','#f3efe6','#ffffff'];
const PALETA_INK_VIZ=['#c9d1d9','#dfeae3','#e3d3bd','#58a6ff','#d9a441','#9a6a2f','#3a3326','#2a2620','#000000'];
// preferințe de citire, ținute în memoria sistemului
let prefViz = { bg:'#0d1117', text:'#c9d1d9', accent:'#58a6ff', font:18, lh:1.7, lumina:0 };
function incarcaPrefViz(){ const s=Memorie.ia(); if(s&&s.vizPref2) prefViz={...prefViz,...s.vizPref2}; }
function tonHex(hex, cant){
  let h=hex.replace('#',''); if(h.length===3)h=h.split('').map(c=>c+c).join('');
  let r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  const aj=v=>Math.max(0,Math.min(255,Math.round(v+(cant/100)*255)));
  const hx=v=>v.toString(16).padStart(2,'0');
  return '#'+hx(aj(r))+hx(aj(g))+hx(aj(b));
}
function deschideVizualizareSimpla(f){
  const eMd=/\.(md|markdown)$/i.test(f.cale);
  deschideFereastra('▢ '+f.cale,(c)=>{
    incarcaPrefViz();
    const root=document.createElement('div');
    root.style.cssText='height:100%;display:flex;flex-direction:column;position:relative';
    root.innerHTML=`
      <div class="viz-bara">
        <span class="viz-nume"></span>
        <span class="viz-edit" title="editează">✎</span>
        <span class="viz-aspect" title="aspect">◐</span>
        <span class="viz-mic" title="micșorează">A−</span>
        <span class="viz-mare" title="mărește">A+</span>
      </div>
      <div class="viz-corp"></div>
      <div class="viz-panou">
        <div class="ts-rand"><label>Fundal</label><div class="viz-swBg ed-sw2"></div></div>
        <div class="ts-rand"><label>Luminozitate (deschis ← → închis)</label><div class="ts-ctrl"><input type="range" class="viz-lumina" min="-50" max="50" step="1"><span class="ts-val viz-luminaV"></span></div></div>
        <div class="ts-rand"><label>Culoare text</label><div class="viz-swInk ed-sw2"></div></div>
        <div class="ts-rand"><label>Mărime font</label><div class="ts-ctrl"><input type="range" class="viz-font" min="13" max="30" step="1"><span class="ts-val viz-fontV"></span></div></div>
        <div class="ts-rand"><label>Spațiere rânduri</label><div class="ts-ctrl"><input type="range" class="viz-lh" min="1.1" max="2.3" step="0.05"><span class="ts-val viz-lhV"></span></div></div>
        <div class="term-setari-x viz-panou-x">gata</div>
      </div>`;
    c.appendChild(root);
    root.querySelector('.viz-nume').textContent=f.cale;
    const corpV=root.querySelector('.viz-corp');
    const panou=root.querySelector('.viz-panou');
    const btnEdit=root.querySelector('.viz-edit');
    let mod='citire';          // 'citire' | 'editare'
    let salvTimer=null;

    function md2htmlLocal(md){
      const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return md.split('\n').map(l=>{
        let t=l.trim();
        if(t.startsWith('## '))return '<h2>'+esc(t.slice(3))+'</h2>';
        if(t.startsWith('# '))return '<h1>'+esc(t.slice(2))+'</h1>';
        if(t.startsWith('> '))return '<blockquote>'+esc(t.slice(2))+'</blockquote>';
        if(/^[-*+]\s/.test(t))return '<li>'+esc(t.replace(/^[-*+]\s/,''))+'</li>';
        if(t==='')return '';
        return '<p>'+esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')+'</p>';
      }).join('');
    }
    // salvare automată (ca în modelul tău: scrii, se salvează singur)
    function programeazaSalvare(){
      clearTimeout(salvTimer);
      salvTimer=setTimeout(async()=>{ try{ await Depozit.scrie(f); }catch(e){} },500);
    }
    function randeazaCorp(){
      const bg=tonHex(prefViz.bg, prefViz.lumina);
      const txt=tonHex(prefViz.text, prefViz.lumina*0.3);
      const ac=prefViz.accent;
      if(mod==='editare'){
        corpV.innerHTML='';
        const ta=document.createElement('textarea');
        ta.className='viz-scriere';
        ta.value=f.continut||'';
        ta.spellcheck=false;
        ta.style.cssText='width:100%;min-height:100%;border:none;outline:none;resize:none;'+
          'background:transparent;color:inherit;font:inherit;line-height:inherit;'+
          'padding:0;display:block;caret-color:'+ac;
        ta.addEventListener('input',()=>{ f.continut=ta.value; programeazaSalvare(); });
        corpV.appendChild(ta);
        setTimeout(()=>ta.focus(),150);
      } else if(eMd){
        corpV.innerHTML='<div class="vd">'+md2htmlLocal(f.continut||'')+'</div>';
        const s=corpV.querySelector('.vd');
        s.querySelectorAll('h1').forEach(h=>{h.style.color=txt;h.style.fontSize='1.6em';h.style.margin='.3em 0 .5em'});
        s.querySelectorAll('h2').forEach(h=>{h.style.color=ac;h.style.fontSize='1.3em';h.style.margin='1em 0 .3em'});
        s.querySelectorAll('p').forEach(p=>p.style.margin='0 0 .9em');
        s.querySelectorAll('blockquote').forEach(b=>{b.style.borderLeft='2px solid '+ac;b.style.paddingLeft='14px';b.style.opacity='.85';b.style.fontStyle='italic';b.style.margin='0 0 .9em'});
        s.querySelectorAll('code').forEach(cc=>{cc.style.background=ac+'22';cc.style.padding='.1em .4em';cc.style.borderRadius='4px'});
        s.querySelectorAll('strong').forEach(x=>x.style.color=txt);
        s.querySelectorAll('li').forEach(li=>{li.style.margin='.3em 0 .3em 1.2em'});
      } else {
        corpV.innerHTML='<pre style="white-space:pre-wrap;font-family:inherit;margin:0">'+(f.continut||'(gol)').replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</pre>';
      }
    }
    function aplica(){
      const bg=tonHex(prefViz.bg, prefViz.lumina);
      const txt=tonHex(prefViz.text, prefViz.lumina*0.3);
      const ac=prefViz.accent;
      root.style.background=bg; root.style.color=txt;
      root.querySelector('.viz-bara').style.cssText='display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid '+ac+'33;background:'+bg+';flex-shrink:0';
      root.querySelector('.viz-nume').style.cssText='flex:1;font-size:.82rem;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
      root.querySelectorAll('.viz-aspect,.viz-mic,.viz-mare').forEach(x=>{x.style.cssText='cursor:pointer;color:'+ac+';padding:6px 8px;font-size:1.1rem'});
      btnEdit.style.cssText='cursor:pointer;color:'+ac+';padding:7px 12px;font-size:1rem;border:1px solid '+ac+'55;border-radius:8px;font-weight:600';
      corpV.style.cssText='flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 40px;width:100%;font-size:'+prefViz.font+'px;line-height:'+prefViz.lh+';background:'+bg+';color:'+txt+';';
      randeazaCorp();
    }
    function salv(){ Memorie.salveaza({vizPref2:prefViz}); }
    // comutare citire ↔ editare
    btnEdit.addEventListener('click',()=>{
      mod = mod==='editare' ? 'citire' : 'editare';
      btnEdit.textContent = mod==='editare' ? '✓ citește' : '✎';
      btnEdit.title = mod==='editare' ? 'înapoi la citire' : 'editează';
      aplica();
    });
    // swatches
    function faSw(cont, culori, set){
      cont.innerHTML='';
      culori.forEach(col=>{ const s=document.createElement('span'); s.className='pic2'; s.style.background=col; s.addEventListener('click',()=>{set(col);aplica();salv();}); cont.appendChild(s); });
    }
    faSw(root.querySelector('.viz-swBg'), PALETA_BG_VIZ, c=>prefViz.bg=c);
    faSw(root.querySelector('.viz-swInk'), PALETA_INK_VIZ, c=>prefViz.text=c);
    // cursoare
    const rLum=root.querySelector('.viz-lumina'), rF=root.querySelector('.viz-font'), rH=root.querySelector('.viz-lh');
    function sinc(){
      rLum.value=prefViz.lumina; root.querySelector('.viz-luminaV').textContent=(prefViz.lumina>0?'+':'')+prefViz.lumina;
      rF.value=prefViz.font; root.querySelector('.viz-fontV').textContent=prefViz.font+'px';
      rH.value=prefViz.lh; root.querySelector('.viz-lhV').textContent=(+prefViz.lh).toFixed(2);
    }
    rLum.addEventListener('input',()=>{prefViz.lumina=+rLum.value;root.querySelector('.viz-luminaV').textContent=(prefViz.lumina>0?'+':'')+prefViz.lumina;aplica();salv();});
    rF.addEventListener('input',()=>{prefViz.font=+rF.value;root.querySelector('.viz-fontV').textContent=prefViz.font+'px';aplica();salv();});
    rH.addEventListener('input',()=>{prefViz.lh=+rH.value;root.querySelector('.viz-lhV').textContent=(+prefViz.lh).toFixed(2);aplica();salv();});
    root.querySelector('.viz-aspect').addEventListener('click',()=>{ panou.classList.toggle('deschis'); sinc(); });
    root.querySelector('.viz-panou-x').addEventListener('click',()=>panou.classList.remove('deschis'));
    root.querySelector('.viz-mare').addEventListener('click',()=>{ prefViz.font=Math.min(prefViz.font+1,30); aplica(); salv(); });
    root.querySelector('.viz-mic').addEventListener('click',()=>{ prefViz.font=Math.max(prefViz.font-1,12); aplica(); salv(); });
    aplica();
  },{},{appId:'viz:'+f.cale, iconita:'▢'});
}



function ruleazaHtml(nume, cod, fisierDeschis){
  ruleazaOaspete(nume, cod, fisierDeschis||null);
}

/* ===================== APLICAȚIA: APLICAȚII (.html) ===================== */
Nucleu.inregistreaza({
  id:'aplicatii', nume:'Aplicații', iconita:'▷',
  montare(corp){
    const root=document.createElement('div');
    root.className='fisiere';
    corp.appendChild(root);

    // input ascuns pentru alegătorul de fișiere Android
    const alegator=document.createElement('input');
    alegator.type='file';
    alegator.accept='.html,.htm,text/html';
    alegator.style.display='none';
    root.appendChild(alegator);

    alegator.addEventListener('change',async()=>{
      const fis=alegator.files[0];
      if(!fis) return;
      const cod=await fis.text();
      const nume=fis.name;
      await Depozit.scrie({cale:nume,tip:'html',continut:cod,creat:Date.now()});
      alegator.value='';
      randeaza();
    });

    randeaza();

    async function randeaza(){
      const toate=await Depozit.toate();
      const apps=toate.filter(f=>f.tip==='html');
      root.querySelectorAll('.cale-bar,.rand,.gol,.buton-adauga').forEach(x=>x.remove());

      const buton=document.createElement('div');
      buton.className='buton-adauga';
      buton.style.cssText='margin:14px 18px;padding:14px;border:1px dashed var(--linie-clar);border-radius:12px;text-align:center;color:var(--accent);cursor:pointer;font-size:.92rem';
      buton.textContent='＋  Adaugă o aplicație (.html)';
      buton.addEventListener('click',()=>alegator.click());
      root.appendChild(buton);

      if(!apps.length){
        const g=document.createElement('div');
        g.className='gol';
        g.innerHTML='Nicio aplicație încă.\nApasă butonul de sus și alege un fișier .html din telefon.\nSe va rula aici, înăuntru, offline.';
        root.appendChild(g);
        return;
      }
      apps.sort((a,b)=>a.cale.localeCompare(b.cale));
      for(const a of apps){
        const r=document.createElement('div');
        r.className='rand';
        r.innerHTML=`<span class="ig">▷</span>
          <div class="info"><div class="n">${a.cale}</div>
          <div class="m">aplicație · ${volumFis(a.continut)}</div></div>
          <span class="sterge-app" style="color:var(--text-stins);padding:6px 10px">✕</span>`;
        r.querySelector('.info').addEventListener('click',()=>ruleazaHtml(a.cale,a.continut));
        r.querySelector('.ig').addEventListener('click',()=>ruleazaHtml(a.cale,a.continut));
        r.querySelector('.sterge-app').addEventListener('click',async(e)=>{
          e.stopPropagation();
          await Depozit.sterge(a.cale);
          randeaza();
        });
        root.appendChild(r);
      }
    }
  }
});

/* ============================================================
   UTILITARE — unelte grupate, ca meniul Start
   ============================================================ */
Nucleu.inregistreaza({
  id:'utilitare', nume:'Utilitare', iconita:'⚒',
  montare(corp){
    const root=document.createElement('div');
    root.className='util';
    corp.appendChild(root);
    root.innerHTML=`
      <div class="util-file">
        <span class="uf activa" data-g="bani">Bani</span>
        <span class="uf" data-g="doctor">Doctor</span>
      </div>
      <div class="util-corp"></div>`;
    const file=root.querySelector('.util-file');
    const corpU=root.querySelector('.util-corp');

    file.addEventListener('click',e=>{
      const b=e.target.closest('.uf'); if(!b) return;
      file.querySelectorAll('.uf').forEach(x=>x.classList.toggle('activa',x===b));
      randeaza(b.dataset.g);
    });

    function camp(eticheta, placeholder, buton, actiune){
      return `<div class="u-rand">
        <label>${eticheta}</label>
        <div class="u-ctrl">
          <input type="text" placeholder="${placeholder}" data-a="${actiune}">
          <button data-a="${actiune}">${buton}</button>
        </div>
        <div class="u-rez" data-r="${actiune}"></div>
      </div>`;
    }
    function rezultat(actiune, text, cls){
      const r=corpU.querySelector('[data-r="'+actiune+'"]');
      if(r){ r.textContent=text; r.className='u-rez '+(cls||''); }
    }

    async function randeaza(grup){
      corpU.innerHTML='';
      if(grup==='bani'){
        const chelt=(Memorie.ia().cheltuieli)||[];
        const d=new Date(); const lunaAsta=d.getFullYear()+'-'+d.getMonth();
        const ale=chelt.filter(c=>{const x=new Date(c.cand);return (x.getFullYear()+'-'+x.getMonth())===lunaAsta;});
        let bilant='';
        if(!ale.length) bilant='<div class="u-gol">Nicio cheltuială luna asta.</div>';
        else{
          const pe={}; let total=0;
          for(const c of ale){ pe[c.categorie]=(pe[c.categorie]||0)+c.suma; total+=c.suma; }
          bilant='<div class="u-bilant">';
          Object.entries(pe).sort((a,b)=>b[1]-a[1]).forEach(([cat,s])=>{
            const proc=Math.round(s/total*100);
            bilant+=`<div class="u-bar"><span class="u-cat">${cat}</span>
              <span class="u-bara"><i style="width:${proc}%"></i></span>
              <span class="u-suma">${s} (${proc}%)</span></div>`;
          });
          bilant+='<div class="u-total">TOTAL: '+total+'</div></div>';
        }
        corpU.innerHTML =
          camp('Cheltuială (sumă + categorie)','ex: 50 mâncare','Notează','cheltuit') +
          bilant;
      }
      else if(grup==='doctor'){
        corpU.innerHTML='<div class="u-gol">Se verifică sistemul...</div>';
        const brute=await Depozit.bruteTot();
        const decriptate=await Depozit.toateNefiltrate();
        const total=brute.length;
        const criptate=brute.filter(f=>Cripto.esteCriptat(f.continut)).length;
        const vechi=brute.filter(f=>typeof f.continut==='string' && f.continut && !Cripto.esteCriptat(f.continut)).length;
        const stricate=decriptate.filter(f=>f.continut==='⚠ eroare la decriptare' || f.continut==='⚠ blocat');
        const apps=decriptate.filter(f=>f.tip==='html').length;
        const fisiereReale=decriptate.filter(f=>f.tip!=='folder').length;

        let octeti=0; for(const f of decriptate){ try{octeti+=new Blob([f.continut||'']).size;}catch(e){} }
        const fmtOcteti=b=>b<1024?b+' B':b<1024*1024?(b/1024).toFixed(1)+' KB':(b/(1024*1024)).toFixed(2)+' MB';

        let persistent=null, est=null;
        try{ if(navigator.storage && navigator.storage.persisted) persistent=await navigator.storage.persisted(); }catch(e){}
        try{ if(navigator.storage && navigator.storage.estimate) est=await navigator.storage.estimate(); }catch(e){}

        let html='';
        // ---- criptare ----
        html+='<div class="u-rand"><label>Criptare</label><div class="u-info" style="text-align:left;padding:10px 2px;line-height:2">';
        html+='<div>'+(stricate.length?'⚠️ ':'🔒 ')+'AES-GCM 256 · PBKDF2 310.000 iterații</div>';
        html+='<div>Fișiere criptate: <b style="font-size:1em">'+criptate+'</b> din '+total+'</div>';
        if(vechi>0) html+='<div style="color:var(--accent-cald)">'+vechi+' fișier(e) vechi, încă necriptate — se vor cripta la următoarea salvare</div>';
        html+='</div></div>';

        // ---- fișiere corupte ----
        html+='<div class="u-rand"><label>Fișiere corupte</label>';
        if(!stricate.length){
          html+='<div class="u-info" style="text-align:left;padding:10px 2px">✓ Niciunul. Toate fișierele se decriptează corect.</div>';
        } else {
          html+='<div class="u-nota" style="color:var(--rosu)">'+stricate.length+' fișier(e) nu se pot decripta (parolă schimbată greșit, date corupte, sau salvate cu altă cheie).</div>';
          html+='<div class="u-lista" data-corupte></div>';
        }
        html+='</div>';

        // ---- spațiu ----
        html+='<div class="u-rand"><label>Spațiu folosit</label><div class="u-info" style="text-align:left;padding:6px 2px">';
        if(est){
          const used=est.usage||0, quota=est.quota||0;
          const pct=quota?Math.round(used/quota*100):0;
          const fmt=b=>b>=1073741824?(b/1073741824).toFixed(1)+' GB':b>=1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';
          html+='<div class="u-bilant"><div class="u-bar"><span class="u-cat">Folosit</span><span class="u-bara"><i style="width:'+Math.min(pct,100)+'%"></i></span><span class="u-suma">'+fmt(used)+' ('+pct+'%)</span></div></div>';
          html+='<div style="color:var(--text-stins);font-size:.82rem;margin-top:4px">Liber: '+fmt(Math.max(0,quota-used))+'</div>';
        } else {
          html+='<div style="color:var(--text-stins)">Browserul nu oferă această informație.</div>';
        }
        html+='<div style="margin-top:8px;color:var(--text-stins);font-size:.82rem">Stocare persistentă: '+
          (persistent===null?'necunoscut':persistent?'✓ activă (browserul nu va șterge singur datele)':'⚠ inactivă — browserul le poate șterge dacă rămâne fără spațiu')+'</div>';
        html+='</div></div>';

        // ---- statistici ----
        html+='<div class="u-rand"><label>Statistici</label><div class="u-info" style="text-align:left;padding:10px 2px;line-height:2">';
        html+='<div>Fișiere: '+fisiereReale+'  ·  Aplicații: '+apps+'</div>';
        html+='<div>Spațiu total (necriptat, aproximativ): '+fmtOcteti(octeti)+'</div>';
        html+='</div></div>';

        corpU.innerHTML=html;

        if(stricate.length){
          const gazda=corpU.querySelector('[data-corupte]');
          for(const f of stricate){
            const r=document.createElement('div'); r.className='rand';
            r.innerHTML='<span class="ig">⚠</span><div class="info"><div class="n">'+f.cale+'</div><div class="m">'+f.tip+'</div></div>';
            r.addEventListener('click',()=>deschideCuApp(f));
            gazda.appendChild(r);
          }
        }
      }
      lega();
    }

    function lega(){
      corpU.querySelectorAll('button[data-a]').forEach(b=>{
        b.addEventListener('click',()=>ruleaza(b.dataset.a));
      });
      corpU.querySelectorAll('input[data-a]').forEach(inp=>{
        inp.addEventListener('keydown',e=>{ if(e.key==='Enter') ruleaza(inp.dataset.a); });
      });
    }

    async function ruleaza(a){
      const inp=corpU.querySelector('input[data-a="'+a+'"]');
      const v=inp?inp.value.trim():'';
      try{
        if(a==='calc'){
          if(!/^[\d\s+\-*/().,%]+$/.test(v)) return rezultat(a,'Doar numere și + - * / ( ) %','err');
          rezultat(a, v+' = '+Function('"use strict";return ('+v.replace(/,/g,'.')+')')(), 'ok');
        }
        else if(a==='procent'){
          const m=v.match(/([\d.,]+)\s*(?:%|la suta)?\s*din\s*([\d.,]+)/i);
          if(!m) return rezultat(a,'Scrie: 20 din 150','err');
          const p=parseFloat(m[1].replace(',','.')), t=parseFloat(m[2].replace(',','.'));
          rezultat(a, p+'% din '+t+' = '+(p*t/100), 'ok');
        }
        else if(a==='medie'){
          const nr=v.split(/[\s,]+/).map(x=>parseFloat(x.replace(',','.'))).filter(x=>!isNaN(x));
          if(!nr.length) return rezultat(a,'Scrie numere separate prin spațiu','err');
          const s=nr.reduce((x,y)=>x+y,0);
          rezultat(a,'Media a '+nr.length+' numere = '+(s/nr.length).toFixed(2)+'   (suma '+s+')','ok');
        }
        else if(a==='conv'){
          const m=v.match(/^([\d.,]+)\s*(\S+)(?:\s+(?:in|în))?\s+(\S+)$/i);
          if(!m) return rezultat(a,'Scrie: 10 km mile','err');
          const val=parseFloat(m[1].replace(',','.')), din=m[2].toLowerCase(), spre=m[3].toLowerCase();
          if(din==='c'&&spre==='f') return rezultat(a, val+'°C = '+(val*9/5+32).toFixed(1)+'°F','ok');
          if(din==='f'&&spre==='c') return rezultat(a, val+'°F = '+((val-32)*5/9).toFixed(1)+'°C','ok');
          const R={'km:mile':0.621371,'mile:km':1.60934,'kg:lb':2.20462,'lb:kg':0.453592,
                   'm:ft':3.28084,'ft:m':0.3048,'cm:inch':0.393701,'inch:cm':2.54,'l:gal':0.264172,'gal:l':3.78541};
          const r=R[din+':'+spre];
          if(!r) return rezultat(a,'Nu știu conversia asta','err');
          rezultat(a, val+' '+din+' = '+(val*r).toFixed(3)+' '+spre,'ok');
        }
        else if(a==='crono'){
          const m=v.match(/^([\d.,]+)\s*(.*)$/);
          if(!m) return rezultat(a,'Scrie: 10 cumpără pâine','err');
          const min=parseFloat(m[1].replace(',','.')), text=m[2]||'';
          if(isNaN(min)||min<=0) return rezultat(a,'Pune un număr de minute','err');
          Temporizatoare.porneste(min, text);
          rezultat(a,'Pornit! Vezi timpul rămas sus, în bară.'+(text?('  ('+text+')'):''),'ok');
          inp.value='';
        }
        else if(a==='sarcina'){
          if(!v) return rezultat(a,'Scrie o sarcină','err');
          let text=v, termen=null;
          const m=text.match(/\s+(?:pana|până)\s+(\S+)\s*$/i);
          if(m){ termen=parseTermenGlobal(m[1]); if(termen) text=text.slice(0,m.index).trim(); }
          const s=(Memorie.ia().sarcini)||[];
          s.push({text,gata:false,creat:Date.now(),termen});
          await Memorie.salveaza({sarcini:s});
          inp.value=''; randeaza('sarcini');
        }
        else if(a==='cheltuit'){
          const m=v.match(/^([\d.,]+)\s+(.+)$/);
          if(!m) return rezultat(a,'Scrie: 50 mâncare','err');
          const suma=parseFloat(m[1].replace(',','.'));
          if(isNaN(suma)) return rezultat(a,'Suma nu e un număr','err');
          const c=(Memorie.ia().cheltuieli)||[];
          c.push({suma, categorie:m[2].trim().toLowerCase(), cand:Date.now()});
          await Memorie.salveaza({cheltuieli:c});
          inp.value=''; randeaza('bani');
        }
        else if(a==='parola'){
          const lung=Math.min(Math.max(parseInt(v)||14,8),40);
          const set='abcdefghijkmnopqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#$%&*';
          let p=''; const rnd=new Uint32Array(lung); crypto.getRandomValues(rnd);
          for(let i=0;i<lung;i++) p+=set[rnd[i]%set.length];
          rezultat(a, p, 'ok mono');
        }
        else if(a==='uuid'){
          rezultat(a, (crypto.randomUUID?crypto.randomUUID():'—'), 'ok mono');
        }
        else if(a==='hex'){
          const n=parseInt(v);
          if(isNaN(n)) return rezultat(a,'Scrie un număr','err');
          rezultat(a, n+' = 0x'+n.toString(16).toUpperCase()+'  = bin '+n.toString(2),'ok mono');
        }
        else if(a==='b64'){
          if(!v) return rezultat(a,'Scrie un text','err');
          rezultat(a, btoa(unescape(encodeURIComponent(v))),'ok mono');
        }
        else if(a==='b64d'){
          try{ rezultat(a, decodeURIComponent(escape(atob(v))),'ok'); }
          catch(e){ rezultat(a,'Nu pot decoda','err'); }
        }
        else if(a==='ts'){
          rezultat(a,'Unix: '+Math.floor(Date.now()/1000)+'   (ms: '+Date.now()+')','ok mono');
        }
      }catch(e){ rezultat(a,'Eroare: '+e.message,'err'); }
    }

    randeaza('bani');
    return ()=>{ if(corpU._opreste) corpU._opreste(); };
  }
});

// parseTermen global (folosit și de Utilitare)
function parseTermenGlobal(cuv){
  const c=(cuv||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const d=new Date(); d.setHours(23,59,0,0);
  if(c==='azi') return d.getTime();
  if(c==='maine'){ d.setDate(d.getDate()+1); return d.getTime(); }
  if(c==='poimaine'){ d.setDate(d.getDate()+2); return d.getTime(); }
  const zile={duminica:0,luni:1,marti:2,miercuri:3,joi:4,vineri:5,sambata:6};
  if(c in zile){ let dif=(zile[c]-d.getDay()+7)%7; if(dif===0)dif=7; d.setDate(d.getDate()+dif); return d.getTime(); }
  const m=c.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3],23,59).getTime();
  return null;
}
function dataScurta(ts){
  const d=new Date(ts);
  const zile=['dum','lun','mar','mie','joi','vin','sâm'];
  return zile[d.getDay()]+' '+String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');
}

      async export(){
        const fisiere=(await Depozit.toate()).filter(x=>x.tip!=='backup');
        const stare=Memorie.ia();
        const pachet={ logos_backup:1, data:new Date().toISOString(), fisiere, memorie:stare };
        const criptat=await Cripto.encripteaza(JSON.stringify(pachet));
        const invelis={ logos_backup_criptat:1, data:criptat };
        const json=JSON.stringify(invelis);
        const nume='logos-backup-'+new Date().toISOString().slice(0,10)+'.json';
        // descarcă un fișier REAL pe telefon (în Descărcări) — iese din browser, dar criptat
        try{
          const blob=new Blob([json],{type:'application/json'});
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=url; a.download=nume;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(()=>URL.revokeObjectURL(url),1000);
          scrie('Backup criptat descărcat: '+nume+'  ('+volumFis(json)+')','cald');
          scrie('E criptat cu parola master — fără ea, fișierul e inutil. Pune-l la loc sigur (card, cloud).','stins');
        }catch(e){
          scrie('Nu am putut descărca. Salvez în depozit ca rezervă.','err');
          await Depozit.scrie({cale:nume, tip:'backup', continut:json, creat:Date.now()});
        }
      },
      async incarca(){
        // deschide selectorul de fișiere al telefonului
        const inp=document.createElement('input');
        inp.type='file'; inp.accept='.json,application/json';
        inp.addEventListener('change',async()=>{
          const file=inp.files[0]; if(!file) return;
          const r=new FileReader();
          r.onload=async()=>{
            let invelis;
            try{ invelis=JSON.parse(r.result); }catch(e){ scrie('Fișierul nu e un backup valid.','err'); return; }
            let pachet=null;
            if(invelis.logos_backup_criptat){
              try{ pachet=JSON.parse(await Cripto.decripteaza(invelis.data)); }
              catch(e){ scrie('Nu am putut decripta backup-ul (parolă greșită sau fișier corupt).','err'); return; }
            } else if(invelis.logos_backup){
              pachet=invelis; // backup vechi, necriptat — îl acceptăm pentru compatibilitate
            }
            if(!pachet || !pachet.logos_backup){ scrie('Nu e un backup Logos.','err'); return; }
            let n=0;
            for(const fis of (pachet.fisiere||[])){ if(fis.tip!=='backup'){ await Depozit.scrie(fis); n++; } }
            if(pachet.memorie){ await Memorie.salveaza(pachet.memorie); }
            scrie('Am adus '+n+' fișier(e) din backup-ul de pe telefon.','cald');
            scrie('Reîncarcă Logos ca să se vadă tot.','stins');
          };
          r.readAsText(file);
        });
        inp.click();
        scrie('Alege fișierul de backup de pe telefon…','stins');
      },

      // ---- TRUSA TEHNICĂ ----
      async procent(arg){
        const m=(arg||'').match(/([\d.,]+)\s*(?:%|la suta)?\s*din\s*([\d.,]+)/i);
        if(!m){ scrie('Folosire:  procent 20 din 150','err'); return; }
        const p=parseFloat(m[1].replace(',','.')), t=parseFloat(m[2].replace(',','.'));
        scrie(p+'% din '+t+' = '+(p*t/100),'cald');
      },
      async converteste(arg){
        const m=(arg||'').trim().match(/^([\d.,]+)\s*(\S+)(?:\s+(?:in|în))?\s+(\S+)$/i);
        if(!m){ scrie('Folosire:  converteste 10 km mile','err'); return; }
        const v=parseFloat(m[1].replace(',','.'));
        const din=m[2].toLowerCase(), spre=m[3].toLowerCase();
        const R={ 'km:mile':0.621371,'mile:km':1.60934,'kg:lb':2.20462,'lb:kg':0.453592,
                  'm:ft':3.28084,'ft:m':0.3048,'cm:inch':0.393701,'inch:cm':2.54,'l:gal':0.264172,'gal:l':3.78541 };
        if(din==='c'&&spre==='f'){ scrie(v+'°C = '+(v*9/5+32).toFixed(1)+'°F','cald'); return; }
        if(din==='f'&&spre==='c'){ scrie(v+'°F = '+((v-32)*5/9).toFixed(1)+'°C','cald'); return; }
        const r=R[din+':'+spre];
        if(!r){ scrie('Știu: km↔mile, kg↔lb, m↔ft, cm↔inch, l↔gal, c↔f','err'); return; }
        scrie(v+' '+din+' = '+(v*r).toFixed(3)+' '+spre,'cald');
      },

      },
      async parola(arg){
        const lung=Math.min(Math.max(parseInt(arg)||14,8),40);
        const set='abcdefghijkmnopqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#$%&*';
        let p=''; const rnd=new Uint32Array(lung); crypto.getRandomValues(rnd);
        for(let i=0;i<lung;i++) p+=set[rnd[i]%set.length];
        scrie('Parolă ('+lung+'): '+p,'cald');
        scrie('(selecteaz-o și copiaz-o acum)','stins');
      },
      async uuid(){
        const u=crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);});
        scrie(u,'cald');
      },
      async timestamp(){
        scrie('Unix: '+Math.floor(Date.now()/1000)+'   (milisecunde: '+Date.now()+')','cald');
      },
      async hex(arg){
        const n=parseInt((arg||'').trim());
        if(isNaN(n)){ scrie('Folosire:  hex 255','err'); return; }
        scrie(n+' = 0x'+n.toString(16).toUpperCase()+'  = bin '+n.toString(2),'cald');
      },
      async base64(arg){
        const t=(arg||'').trim();
        if(!t){ scrie('Folosire:  base64 text   (sau base64 dec <cod>)','err'); return; }
        if(t.startsWith('dec ')){
          try{ scrie(decodeURIComponent(escape(atob(t.slice(4).trim()))),'cald'); }
          catch(e){ scrie('Nu pot decoda.','err'); }
        } else {
          scrie(btoa(unescape(encodeURIComponent(t))),'cald');

      },

      // ---- RITUAL: jurnalul zilei ----
      async azi(arg){
        const d=new Date();
        const data=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

        const ore=d.getHours();

        let f=await Depozit.gaseste(nume);

        } else {

          // avertizare: sarcini scadente azi sau întârziate

          else { scrie('E gol încă. Scrie:  azi gândul tău de azi','stins'); }
        }
      },
      async ieri(){
        const d=new Date(Date.now()-864e5);
        const data=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        const f=await Depozit.gaseste('jurnal-'+data+'.md');
        if(!f || !f.continut.trim()){ scrie('Nimic scris ieri.','stins'); return; }
        scrie('── ieri ('+data+') ──','info'); scrie(f.continut,'ok'); scrie('──────────','info');
      },
      // ---- A DOUA MINTE: captură rapidă de gânduri ----
      async gand(arg){
        if(!arg || !arg.trim()){ scrie('Folosire:  gand ce-ți trece prin minte','err'); return; }
        let f=await Depozit.gaseste('ganduri.md');
        if(!f){ f={cale:'ganduri.md',tip:'md',creat:Date.now(),continut:'# Gânduri\n'}; }
        const d=new Date();
        const cand=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
        f.continut += '\n- ['+cand+'] '+arg.trim();
        await Depozit.scrie(f);
        scrie('Prins. (în ganduri.md)','cald');
      },
      async ganduri(){
        const f=await Depozit.gaseste('ganduri.md');
        if(!f || !f.continut.trim()){ scrie('Niciun gând încă. Aruncă unul:  gand ...','stins'); return; }
        scrie(f.continut,'ok');
      },
      // ---- Logos te cunoaște ----
      async numesc(arg){
        // acceptă „ma numesc Vasea" sau „numesc Vasea"
        let nume=(arg||'').trim();
        if(/^numesc\s+/i.test(nume)) nume=nume.replace(/^numesc\s+/i,'').trim();
        if(!nume){ scrie('Folosire:  ma numesc Vasea','err'); return; }
        await Memorie.salveaza({numeUtilizator:nume});

      // ---- cuvinte-cheie: răspunde dacă mesajul CONȚINE un cuvânt ----
      async candcontine(arg){
        const m=(arg||'').match(/^([\s\S]+?)\s*=\s*([\s\S]+)$/);
        if(!m){ scrie('Folosire:  candcontine vreme = Azi pare o zi bună.','err'); return; }
        const cheie=m[1].trim().toLowerCase(), text=m[2].trim();
        const ck=(Memorie.ia().cuvinteCheie)||{};
        ck[cheie]=text; await Memorie.salveaza({cuvinteCheie:ck});
        scrie('Am învățat: dacă scrii ceva cu „'+cheie+'" → '+text,'cald');
      },
      async dialog(){
        const ck=(Memorie.ia().cuvinteCheie)||{};
        const chei=Object.keys(ck);
        if(!chei.length){ scrie('Niciun cuvânt-cheie. Încearcă:  candcontine vreme = E o zi bună.','stins'); return; }
        scrie('Reacționez la cuvintele:','info');
        for(const c of chei) randInvatat(c, ck[c]);
      },
    };

    // ---- potrivire deșteaptă (offline) ----
    // scoate diacritice, semne, majuscule, și cuvinte de umplutură
    const UMPLUTURA=['te','rog','oare','spune','spunemi','spune-mi','imi','îmi','mi','ma','mă','poti','poți','vrei','as','aș','vrea','hai','deci','cam','asa','așa','un','o','de','la','pe','ce','e','ii','îi'];
    function normriz(s){
      return (s||'').toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')  // fără diacritice
        .replace(/[?!.,;:„""''()]/g,' ')                    // fără semne
        .replace(/\s+/g,' ').trim();
    }
    function miez(s){
      // scoate cuvintele de umplutură, lasă miezul întrebării
      return normriz(s).split(' ').filter(c=>c && !UMPLUTURA.includes(c)).join(' ');
    }
    // alege un răspuns dintre variante separate cu |
    function alegeRaspuns(text){
      if(text.includes('|')){
        const variante=text.split('|').map(x=>x.trim()).filter(Boolean);
        return variante[Math.floor(Math.random()*variante.length)];
      }
      return text;
    }

    async function executaUna(txt){
      const sp=txt.indexOf(' ');
      let nume=(sp===-1?txt:txt.slice(0,sp)).toLowerCase();
      let arg = sp===-1?'':txt.slice(sp+1);
      // scurtătură: =2+2 → calc
      if(txt.trim().startsWith('=')){ nume='calc'; arg=txt.trim().slice(1); }
      // comenzi din două cuvinte: „ma numesc Vasea"
      if(nume==='ma' && /^numesc\b/i.test(arg)){ nume='numesc'; arg=arg.replace(/^numesc\s*/i,''); }
      const frazaIntreaga=txt.trim().toLowerCase();
      const fraza_n=normriz(txt);        // normalizată (fără diacritice/semne)
      const fraza_miez=miez(txt);        // doar miezul (fără umplutură)

      // 1) răspunsuri exacte (cu variabile + potrivire iertătoare + variante |)
      const rasp=(Memorie.ia().raspunsuri)||{};
      for(const cheie of Object.keys(rasp)){
        const ck_n=normriz(cheie);
        if(frazaIntreaga===cheie || fraza_n===ck_n || fraza_miez===miez(cheie)){
          scrie(inlocVariabile(alegeRaspuns(rasp[cheie])),'cald'); return;
        }
      }
      if(rasp[nume]){ scrie(inlocVariabile(alegeRaspuns(rasp[nume])),'cald'); return; }

      // 2) cuvinte-acțiune învățate
      const voc=(Memorie.ia().vocabular)||{};
      if(voc[frazaIntreaga]){ await executa(voc[frazaIntreaga]); return; }
      if(voc[nume]){
        // dacă ai scris ceva după cuvânt (ex: „cr 10 pâine"), îl duce mai departe
        const rest=(sp===-1)?'':txt.slice(sp+1).trim();
        await executa(voc[nume]+(rest?(' '+rest):'')); return;
      }

      // 3) comenzi de sistem
      const fn=comenzi[nume];
      if(fn){ try{ await fn(arg); }catch(e){ scrie('Eroare: '+e.message,'err'); } return; }

      // 4) cuvinte-cheie: dacă mesajul CONȚINE un cuvânt (mai multe cu |)
      const ck=(Memorie.ia().cuvinteCheie)||{};
      for(const cheie of Object.keys(ck)){
        // cheia poate avea mai multe cuvinte: „vreme|afara|frig"
        const cuvinte=cheie.split('|').map(x=>normriz(x)).filter(Boolean);
        if(cuvinte.some(c=>fraza_n.includes(c))){
          scrie(inlocVariabile(alegeRaspuns(ck[cheie])),'cald'); return;
        }
      }
      scrie('Necunoscut: '+nume+'   (scrie: ajutor)','err');
    }
    async function executa(linie){
      const txt=(linie||'').trim(); if(!txt) return;
      // lanțuri: împarte pe „ apoi "
      const bucati=txt.split(/\s+apoi\s+/i);
      for(const b of bucati){ await executaUna(b.trim()); }
    }

    intr.addEventListener('keydown',async e=>{
      if(e.key==='Enter'){ const v=intr.value; intr.value=''; if(v.trim()){istoric.push(v.trim());idxIstoric=istoric.length;ecouComanda(v.trim());} executa(v); }
      else if(e.key==='ArrowUp'){ if(idxIstoric>0){idxIstoric--;intr.value=istoric[idxIstoric]||'';} e.preventDefault(); }
      else if(e.key==='ArrowDown'){ if(idxIstoric<istoric.length-1){idxIstoric++;intr.value=istoric[idxIstoric]||'';} else {idxIstoric=istoric.length;intr.value='';} e.preventDefault(); }
      else if(e.key==='Tab'){
        e.preventDefault();
        const v=intr.value;
        const sp=v.lastIndexOf(' ');
        const inceput=(sp===-1)?v:v.slice(sp+1);   // ce completăm
        const prefix=(sp===-1)?'':v.slice(0,sp+1); // ce rămâne neatins
        if(!inceput) return;
        let candidati;
        if(sp===-1){
          // primul cuvânt → completează comenzi + cuvinte învățate
          const voc=Object.keys((Memorie.ia().vocabular)||{});
          candidati=[...Object.keys(comenzi), ...voc].filter(c=>c.startsWith(inceput.toLowerCase()));
        } else {
          // după comandă → completează nume de fișiere
          const toate=await Depozit.toate();
          candidati=toate.map(f=>f.cale).filter(c=>c.toLowerCase().startsWith(inceput.toLowerCase()));
        }
        if(!candidati.length) return;
        if(candidati.length===1){ intr.value=prefix+candidati[0]+' '; }
        else {
          // prefixul comun cel mai lung
          let comun=candidati[0];
          for(const c of candidati){ while(!c.toLowerCase().startsWith(comun.toLowerCase())) comun=comun.slice(0,-1); }
          intr.value=prefix+comun;
          scrie(candidati.slice(0,12).join('   '),'stins');
        }
      }
    });
    // tragi un fișier din Fișiere peste Terminal → îi pune numele în comandă
    const radTerm = corp;
    // în timpul unei trageri interne ținem calea aici (dataTransfer e „gol" la dragover în unele browsere)
    function permiteDrop(e){
      // dacă e o tragere internă Logos SAU nu știm încă, permitem
      if(!e.dataTransfer) return false;
      const t=[...e.dataTransfer.types];
      return t.includes('text/logos-fisier') || (window.__caleTrasa && !t.includes('Files'));
    }
    radTerm.addEventListener('dragenter',e=>{
      if(!permiteDrop(e)) return;
      e.preventDefault(); e.stopPropagation();
      radTerm.classList.add('term-tinta');
    });
    radTerm.addEventListener('dragover',e=>{
      if(!permiteDrop(e)) return;
      e.preventDefault(); e.stopPropagation();   // ESENȚIAL: fără asta, drop nu se declanșează
      e.dataTransfer.dropEffect='copy';
      radTerm.classList.add('term-tinta');
    });
    radTerm.addEventListener('dragleave',e=>{
      if(!radTerm.contains(e.relatedTarget)) radTerm.classList.remove('term-tinta');
    });
    radTerm.addEventListener('drop',e=>{
      e.preventDefault(); e.stopPropagation();
      radTerm.classList.remove('term-tinta');
      let cale='';
      try{ cale=e.dataTransfer.getData('text/logos-fisier') || e.dataTransfer.getData('text/plain'); }catch(_){}
      if(!cale) cale = window.__caleTrasa || '';
      if(!cale) return;
      intr.value = (intr.value ? intr.value.replace(/\s*$/,'')+' ' : '') + cale + ' ';
      intr.focus();
    });
    setTimeout(()=>intr.focus(),350);
  }
});

// ---- MOD BIROU: detectează ecran mare (laptop/desktop) ----
// are utilizatorul un arătător fin (mouse/trackpad) sau degetul?
function areMouse(){
  try{
    return window.matchMedia('(pointer: fine)').matches
        && window.matchMedia('(hover: hover)').matches;
  }catch(e){ return true; }
}
function actualizeazaMod(){
  const eraBirou = document.body.classList.contains('birou');
  // ferestre alăturate pe orice ecran lat (laptop ȘI tabletă)
  // Modul birou (ferestre alăturate) cere ecran lat ȘI mouse adevărat.
  // Pe iPad, cu degetul, modul birou se blochează pe jumătate — nu am putut
  // găsi de ce (Safari se poartă altfel). Așa că acolo rămâne modul telefon,
  // unde totul merge. Cu o tastatură+trackpad, iPad-ul va primi modul birou singur.
  const birou = window.innerWidth >= 900 && areMouse();
  document.body.classList.toggle('birou', birou);
  // pe atingere marcăm separat, ca să nu punem reguli de mouse
  document.body.classList.toggle('deget', !areMouse());
  if(birou){
    for(const f of ferestreDeschise){ f.el.classList.add('deschis'); f.el.classList.remove('fundal'); }
    asazaManere();
  } else {
    // curăță mânerele; înapoi pe telefon: doar cea activă vizibilă
    stratFerestre.querySelectorAll('.maner-redim').forEach(m=>m.remove());
    for(const f of ferestreDeschise){
      if(f.id===activaId){ f.el.classList.add('deschis'); f.el.classList.remove('fundal'); }
      else { f.el.classList.remove('deschis'); f.el.classList.add('fundal'); }
      f.el.style.flexBasis='';
    }
  }
  // dacă modul chiar s-a schimbat, re-randează Fișiere (panoul lateral apare/dispare)
  if(eraBirou!==birou){
    document.querySelectorAll('.fisiere').forEach(r=>{ if(r._rerandeaza) r._rerandeaza(); });
  }
}
// pune mânere de redimensionare între ferestre
// resetează lățimile fixe, ca ferestrele rămase să se împartă egal
function reseteazaLatimi(){
  for(const f of ferestreDeschise){ f.el.style.flex=''; }
}
function asazaManere(){
  stratFerestre.querySelectorAll('.maner-redim').forEach(m=>m.remove());
  const vizibile=ferestreDeschise.filter(f=>f.el.classList.contains('deschis'));
  for(let i=0;i<vizibile.length-1;i++){
    const stanga=vizibile[i].el, dreapta=vizibile[i+1].el;
    const m=document.createElement('div'); m.className='maner-redim';
    dreapta.before(m);
    facRedimensibil(m, stanga, dreapta);
  }
}
function facRedimensibil(maner, stanga, dreapta){
  let activ=false;
  function porneste(clientX){
    if(activ) return; activ=true;
    maner.classList.add('activ');
    const x0=clientX, ws=stanga.offsetWidth, wd=dreapta.offsetWidth;
    const voal=document.createElement('div');
    voal.style.cssText='position:fixed;inset:0;z-index:99999;cursor:col-resize;background:transparent';
    document.body.appendChild(voal);
    function misca(cx){
      const dif=cx-x0;
      stanga.style.flex='0 0 '+Math.max(180, ws+dif)+'px';
      dreapta.style.flex='0 0 '+Math.max(180, wd-dif)+'px';
    }
    const onMove=ev=>{ misca(ev.clientX); ev.preventDefault(); };
    const onUp=()=>{
      activ=false;
      maner.classList.remove('activ'); voal.remove();
      window.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',onUp);
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
      salveazaLatimi();   // ține minte cum ai împărțit
    };
    window.addEventListener('pointermove',onMove);
    window.addEventListener('pointerup',onUp);
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  }
  maner.addEventListener('pointerdown',e=>{ e.preventDefault(); e.stopPropagation(); porneste(e.clientX); });
  maner.addEventListener('mousedown',e=>{ e.preventDefault(); e.stopPropagation(); porneste(e.clientX); });
}
// ține minte lățimile (după appId, ca să le regăsească la redeschidere)
function salveazaLatimi(){
  const lat={};
  for(const f of ferestreDeschise){
    if(f.el.style.flex && f.appId) lat[f.appId]=f.el.offsetWidth;
  }
  Memorie.salveaza({latimiFerestre:lat});
}
function aplicaLatimiSalvate(){
  const lat=(Memorie.ia().latimiFerestre)||{};
  const vizibile=ferestreDeschise.filter(f=>f.el.classList.contains('deschis'));
  if(vizibile.length<2) return;
  let cuLatime=0;
  for(const f of vizibile){ if(lat[f.appId]) cuLatime++; }
  // aplicăm doar dacă toate au lățime salvată (altfel lăsăm împărțirea egală)
  if(cuLatime!==vizibile.length) return;
  const total=stratFerestre.offsetWidth - (vizibile.length-1)*5;
  const suma=vizibile.reduce((s,f)=>s+lat[f.appId],0);
  if(suma<=0) return;
  for(const f of vizibile){
    f.el.style.flex='0 0 '+Math.max(180, Math.round(lat[f.appId]/suma*total))+'px';
  }
}
window.addEventListener('resize', actualizeazaMod);

// ---- DRAG & DROP: tragi fișiere din sistem direct în Logos ----
(function(){
  let voalDrop=null;
  function aratoVoal(){
    if(voalDrop) return;
    voalDrop=document.createElement('div');
    voalDrop.className='drop-voal';
    voalDrop.innerHTML='<div class="drop-cutie">▤<br>Lasă fișierele aici<br><small>se salvează în Logos</small></div>';
    document.body.appendChild(voalDrop);
  }
  function ascundeVoal(){ if(voalDrop){ voalDrop.remove(); voalDrop=null; } }

  window.addEventListener('dragover',e=>{
    if(window.__caleTrasa) return;              // tragere internă Logos
    if(!e.dataTransfer) return;
    if(![...e.dataTransfer.types].includes('Files')) return;
    e.preventDefault(); aratoVoal();
  });
  window.addEventListener('dragleave',e=>{
    if(e.clientX===0 && e.clientY===0) ascundeVoal();
  });
  window.addEventListener('drop',async e=>{
    if(window.__caleTrasa){ ascundeVoal(); return; }
    if(!e.dataTransfer || !e.dataTransfer.files.length) return;
    e.preventDefault(); ascundeVoal();
    let n=0, ultim=null, nApps=0;
    // dacă Fișiere e deschisă într-un folder, punem fișierele acolo
    let folderTinta='';
    const fmDeschis=document.querySelector('.fisiere');
    if(fmDeschis && fmDeschis._calea) folderTinta=fmDeschis._calea()||'';

    for(const file of e.dataTransfer.files){
      // doar text/markdown/html — Logos nu ține binare
      const ext=(file.name.split('.').pop()||'').toLowerCase();
      if(!['md','txt','html','htm','json','csv','js','css'].includes(ext)){
        alert('Sar peste „'+file.name+'" — Logos ține doar fișiere text (md, txt, html, json, csv...).');
        continue;
      }
      const text=await file.text();
      const cale=folderTinta+file.name;
      const tip = (ext==='md')?'md' : (ext==='html'||ext==='htm')?'html' : 'text';
      const exista=await Depozit.gaseste(cale);
      if(exista && !confirm('„'+cale+'" există deja. Îl înlocuiești?')) continue;
      const f={cale, tip, continut:text, creat:Date.now()};
      await Depozit.scrie(f); n++; ultim=f;
      if(tip==='html') nApps++;
    }
    if(n){
      const fisiereDeschis = document.querySelectorAll('.fisiere');
      if(fisiereDeschis.length){
        fisiereDeschis.forEach(r=>{ if(r._rerandeaza) r._rerandeaza(); });
      } else {
        Nucleu.lanseaza('fisiere');
      }
      if(nApps){
        alert(nApps+' fișier(e) .html au fost adăugate ca APLICAȚII.\nLe găsești în „Aplicații" (iconița ▷), nu în Fișiere.');
      }
    }
  });
})();

// ---- scurtături din taste (utile pe laptop) ----
window.addEventListener('keydown',e=>{
  const scrieCiva = e.target.matches('input,textarea,[contenteditable]');
  // tasta Windows/Meta (sau Ctrl+Space) → meniul Start
  if(e.key==='Meta' || (e.ctrlKey && e.key===' ')){
    e.preventDefault(); comutaMeniuStart(); return;
  }
  if(e.ctrlKey && (e.key==='k'||e.key==='K')){ e.preventDefault(); Nucleu.lanseaza('terminal'); return; }
  if(e.ctrlKey && (e.key==='e'||e.key==='E')){ e.preventDefault(); Nucleu.lanseaza('fisiere'); return; }
  if(e.ctrlKey && (e.key==='u'||e.key==='U')){ e.preventDefault(); Nucleu.lanseaza('utilitare'); return; }
  // Ctrl+N: fișier nou
  if(e.ctrlKey && (e.key==='n'||e.key==='N')){
    e.preventDefault(); fisierNouGlobal(); return;
  }
  // Ctrl+W: închide fereastra activă
  if(e.ctrlKey && (e.key==='w'||e.key==='W')){
    e.preventDefault();
    if(activaId) inchideFereastraId(activaId);
    return;
  }
  // Săgeți simple: comută între ferestre — dar DOAR când nu scrii undeva
  if((e.key==='ArrowLeft' || e.key==='ArrowRight') && !scrieCiva && !e.ctrlKey && !e.altKey){
    if(ferestreDeschise.length<2) return;
    e.preventDefault();
    const i=ferestreDeschise.findIndex(f=>f.id===activaId);
    const pas = e.key==='ArrowRight' ? 1 : -1;
    const j = (i===-1) ? 0 : (i+pas+ferestreDeschise.length)%ferestreDeschise.length;
    aratoFereastra(ferestreDeschise[j].id);
    return;
  }
  // Ctrl+Săgeți: la fel, dar merge și când scrii într-un câmp
  if(e.ctrlKey && (e.key==='ArrowLeft' || e.key==='ArrowRight')){
    e.preventDefault();
    if(ferestreDeschise.length<2) return;
    const i=ferestreDeschise.findIndex(f=>f.id===activaId);
    const pas = e.key==='ArrowRight' ? 1 : -1;
    const j = (i===-1) ? 0 : (i+pas+ferestreDeschise.length)%ferestreDeschise.length;
    aratoFereastra(ferestreDeschise[j].id);
    return;
  }
  // Ctrl+1..9: direct la fereastra n (rămâne, ca alternativă)
  if(e.ctrlKey && /^[1-9]$/.test(e.key)){
    e.preventDefault();
    const n=parseInt(e.key)-1;
    if(ferestreDeschise[n]) aratoFereastra(ferestreDeschise[n].id);
    return;
  }
  if(e.key==='Escape' && !scrieCiva){
    const ms=document.getElementById('meniu-start');
    if(ms){ ms.remove(); return; }   // întâi închide meniul, dacă e deschis
    mergiAcasa(); return;
  }
});

(async()=>{
  await EcranLacat.asteaptaDeblocare();   // parola master se cere o singură dată, la deschidere
  await porneste();
  actualizeazaMod();

  // blocare manuală, disponibilă oricând din meniul de start ("Blochează acum")
  let seBlocheaza=false;

  window.addEventListener('pagehide',()=>{ Cripto.blocheaza(); });
})();

if('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost')){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* fără paznic — Logos merge oricum */ });
  });
}
